<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathBrevet — Maths 3ème · Elyes</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root {
  --bg: #0d0d1f;
  --card: #161630;
  --card2: #1e1e3a;
  --text: #e2e8f0;
  --muted: #8892a4;
  --accent: #f97316;
  --accent2: #fb923c;
  --success: #10b981;
  --error: #ef4444;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(249,115,22,.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(234,88,12,.08) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.screen { position: relative; z-index: 1; min-height: 100vh; display: none; }
.screen.active { display: block; }

.top-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: center; gap: 8px; padding: 10px 16px;
  background: rgba(13,13,31,.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(249,115,22,.12); flex-wrap: wrap;
}
.nav-tab {
  padding: 6px 16px; border-radius: 20px; font-size: .82rem; font-weight: 600;
  cursor: pointer; text-decoration: none; transition: all .2s; border: none; font-family: inherit;
}
.nav-tab.home { background: rgba(255,255,255,.07); color: var(--muted); border: 1px solid rgba(255,255,255,.12); }
.nav-tab.home:hover { background: rgba(255,255,255,.13); color: var(--text); }
.nav-tab.mat  { background: rgba(249,115,22,.2);  color: #fb923c; border: 1px solid rgba(249,115,22,.4); }
.nav-tab.fra  { background: rgba(59,130,246,.12); color: #93c5fd; border: 1px solid rgba(59,130,246,.3); }
.nav-tab.sci  { background: rgba(16,185,129,.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,.3); }
.nav-tab.fra:hover { background: rgba(59,130,246,.25); }
.nav-tab.sci:hover { background: rgba(16,185,129,.28); }

.home-header { text-align: center; padding: 90px 20px 24px; }
.home-header h1 {
  font-size: clamp(2rem, 6vw, 3rem); font-weight: 900;
  background: linear-gradient(135deg, #fb923c 0%, #f59e0b 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: -1px;
}
.home-header .sub { color: var(--muted); margin-top: 6px; font-size: 1rem; }
.week-badge {
  display: inline-block; margin-top: 14px;
  background: rgba(249,115,22,.15); border: 1px solid rgba(249,115,22,.35);
  border-radius: 20px; padding: 5px 18px; font-size: .8rem; color: #fb923c;
}
.topics-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
  gap: 16px; max-width: 960px; margin: 0 auto; padding: 16px 20px 60px;
}
.topic-card {
  background: var(--card); border-radius: 18px; padding: 26px 24px;
  cursor: pointer; border: 1px solid rgba(255,255,255,.05);
  transition: transform .25s, box-shadow .25s, border-color .25s;
  position: relative; overflow: hidden;
}
.topic-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--tc, #f97316);
}
.topic-card:hover {
  transform: translateY(-5px); border-color: rgba(255,255,255,.12);
  box-shadow: 0 24px 48px rgba(0,0,0,.4);
}
.tc-icon { font-size: 2.4rem; margin-bottom: 12px; }
.tc-name { font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
.tc-desc { color: var(--muted); font-size: .83rem; line-height: 1.5; }
.tc-meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 16px; font-size: .78rem; color: var(--muted);
}
.tc-score {
  background: rgba(249,115,22,.18); border-radius: 12px;
  padding: 2px 10px; color: #fb923c; font-weight: 600;
}

#quiz-screen { max-width: 720px; margin: 0 auto; padding: 80px 20px 60px; }
#results-screen { max-width: 620px; margin: 0 auto; padding: 80px 20px 60px; }
.back-btn {
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09);
  color: var(--text); padding: 8px 16px; border-radius: 8px;
  cursor: pointer; font-size: .9rem; margin-bottom: 18px;
  display: inline-flex; align-items: center; gap: 6px; transition: background .2s;
}
.back-btn:hover { background: rgba(255,255,255,.1); }
.quiz-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
.prog-row { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
.prog-bar { flex: 1; height: 7px; background: rgba(255,255,255,.08); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, #f97316, #f59e0b); border-radius: 4px; transition: width .45s ease; }
.prog-txt { font-size: .82rem; color: var(--muted); white-space: nowrap; }

.q-card {
  background: var(--card); border-radius: 20px; padding: 30px 28px;
  border: 1px solid rgba(255,255,255,.05); margin-top: 22px;
  animation: fadeUp .35s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.q-num { font-size: .75rem; color: #fb923c; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
.q-text { font-size: 1.15rem; font-weight: 500; line-height: 1.65; margin-bottom: 24px; }
.opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
@media (max-width: 480px) { .opts-grid { grid-template-columns: 1fr; } }

.opt-btn {
  background: rgba(255,255,255,.04); border: 2px solid rgba(255,255,255,.07);
  border-radius: 12px; padding: 14px 18px; cursor: pointer; color: var(--text);
  font-size: .98rem; text-align: left; display: flex; align-items: center;
  gap: 12px; transition: background .18s, border-color .18s; font-family: inherit;
}
.opt-btn:hover:not(:disabled) { background: rgba(249,115,22,.14); border-color: rgba(249,115,22,.45); }
.opt-btn.correct { background: rgba(16,185,129,.14); border-color: #10b981; }
.opt-btn.wrong   { background: rgba(239,68,68,.14);  border-color: #ef4444; }
.opt-btn:disabled { cursor: default; }
.opt-letter {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,.08); display: flex; align-items: center;
  justify-content: center; font-size: .82rem; font-weight: 700;
}
.opt-btn.correct .opt-letter { background: rgba(16,185,129,.3); }
.opt-btn.wrong   .opt-letter { background: rgba(239,68,68,.3); }

.feedback {
  margin-top: 16px; padding: 14px 18px; border-radius: 12px;
  font-size: .92rem; line-height: 1.55; animation: fadeUp .3s ease;
}
.feedback.ok  { background: rgba(16,185,129,.1);  border: 1px solid rgba(16,185,129,.3); color: #6ee7b7; }
.feedback.err { background: rgba(239,68,68,.1);   border: 1px solid rgba(239,68,68,.3);  color: #fca5a5; }
.next-btn {
  width: 100%; margin-top: 16px; padding: 14px;
  background: linear-gradient(135deg, #f97316, #ea580c);
  border: none; border-radius: 13px; color: #fff;
  font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: opacity .2s, transform .2s;
}
.next-btn:hover { opacity: .9; transform: translateY(-1px); }

#results-screen { max-width: 620px; margin: 0 auto; padding: 20px 20px 60px; }
.res-top { text-align: center; padding: 36px 0 28px; }
.score-wrap { position: relative; width: 150px; height: 150px; margin: 0 auto 22px; }
.score-svg { transform: rotate(-90deg); }
.score-bg  { fill: none; stroke: rgba(255,255,255,.06); stroke-width: 12; }
.score-arc { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
.score-inner {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.score-num { font-size: 2.8rem; font-weight: 900; line-height: 1; }
.score-den { font-size: .85rem; color: var(--muted); }
.res-msg { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
.res-sub { color: var(--muted); margin-bottom: 30px; }

.review-list { display: flex; flex-direction: column; gap: 11px; margin-bottom: 24px; }
.rev-item {
  background: var(--card); border-radius: 13px; padding: 14px 16px;
  border: 1px solid rgba(255,255,255,.05); display: flex; gap: 12px; align-items: flex-start;
}
.rev-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.rev-q { font-size: .88rem; margin-bottom: 4px; line-height: 1.4; }
.rev-a { font-size: .8rem; }
.ok-ans  { color: #10b981; }
.err-ans { color: #ef4444; }
.rev-exp { margin-top: 5px; font-size: .78rem; color: #a78bfa; font-style: italic; line-height: 1.4; }

.res-actions { display: flex; flex-direction: column; gap: 11px; }
.act-btn {
  padding: 14px; border-radius: 13px; font-size: 1rem; font-weight: 700;
  cursor: pointer; border: none; font-family: inherit; transition: opacity .2s, transform .2s; width: 100%;
}
.act-btn:hover { opacity: .9; transform: translateY(-1px); }
.act-primary   { background: linear-gradient(135deg, #f97316, #ea580c); color: #fff; }
.act-secondary { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: var(--text); }

.conf { position: fixed; border-radius: 3px; animation: fall linear forwards; z-index: 9999; pointer-events: none; }
@keyframes fall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}
</style>
</head>

  <div style="display:flex;gap:10px;margin-bottom:18px">

</div>

<script>
function SRNG(seed) {
  let s = seed >>> 0;
  this.next = () => { s = Math.imul(1664525, s) + 1013904223 >>> 0; return s / 0x100000000; };
  this.int  = n => Math.floor(this.next() * n);
  this.shuffle = a => { const r=[...a]; for(let i=r.length-1;i>0;i--){const j=this.int(i+1);[r[i],r[j]]=[r[j],r[i]];} return r; };
  this.pick = (a, n) => this.shuffle(a).slice(0, n);
}
function weekSeed() { const d=new Date(),jan=new Date(d.getFullYear(),0,1); return d.getFullYear()*100+Math.floor((d-jan)/86400000/7); }
function weekLabel() { const d=new Date(),jan=new Date(d.getFullYear(),0,1); return `Semaine ${Math.floor((d-jan)/86400000/7)+1} · ${d.getFullYear()}`; }

const TOPICS = [
  {
    id:'identites', name:'Identités remarquables', icon:'🔣', color:'#f97316',
    desc:'(a+b)², (a-b)², (a+b)(a-b) — développer et factoriser',
    qs:[
      {q:'Développer (a+b)²', o:['a²+2ab+b²','a²+b²','a²-2ab+b²','2a+2b'], a:'a²+2ab+b²', e:'(a+b)² = a²+2ab+b² (première identité remarquable).'},
      {q:'Développer (a-b)²', o:['a²-b²','a²+2ab+b²','a²-2ab+b²','a²-b'], a:'a²-2ab+b²', e:'(a-b)² = a²-2ab+b² (deuxième identité remarquable).'},
      {q:'Développer (a+b)(a-b)', o:['a²-b²','a²+b²','a²-2ab-b²','2a-2b'], a:'a²-b²', e:'(a+b)(a-b) = a²-b² (différence de carrés).'},
      {q:'Développer (x+3)²', o:['x²+9','x²+3x+9','x²+6x+9','x²-6x+9'], a:'x²+6x+9', e:'(x+3)² = x²+2×3x+3² = x²+6x+9.'},
      {q:'Développer (2x-1)²', o:['4x²-4x+1','4x²+1','4x²-1','2x²-4x+1'], a:'4x²-4x+1', e:'(2x-1)² = (2x)²-2×2x×1+1² = 4x²-4x+1.'},
      {q:'Développer (3+2x)²', o:['9+4x²','4x²+6x+9','4x²+12x+9','9+12x+4x²'], a:'4x²+12x+9', e:'(3+2x)² = 9+2×3×2x+(2x)² = 9+12x+4x².'},
      {q:'Factoriser x²-10x+25', o:['(x-5)²','(x+5)²','(x-5)(x+5)','(x-25)²'], a:'(x-5)²', e:'x²-10x+25 = x²-2×5x+5² = (x-5)².'},
      {q:'Factoriser 9x²-16', o:['(3x-4)²','(3x+4)(3x-4)','(9x-16)(9x+16)','(3x-4)(3x+8)'], a:'(3x+4)(3x-4)', e:'9x²-16 = (3x)²-4² = (3x+4)(3x-4).'},
      {q:'Développer (x+5)(x-5)', o:['x²+25','x²-10x+25','x²-25','x²+10x-25'], a:'x²-25', e:'(x+5)(x-5) = x²-5² = x²-25.'},
      {q:'Factoriser x²+8x+16', o:['(x+4)²','(x-4)²','(x+8)²','(x+4)(x-4)'], a:'(x+4)²', e:'x²+8x+16 = x²+2×4x+4² = (x+4)².'},
      {q:'Développer (3x+2)²', o:['9x²+4','9x²+6x+4','9x²+12x+4','6x²+12x+4'], a:'9x²+12x+4', e:'(3x+2)² = (3x)²+2×3x×2+2² = 9x²+12x+4.'},
      {q:'Factoriser 4x²-9', o:['(2x-3)²','(2x+3)(2x-3)','(4x-9)(4x+9)','(2x-3)(2x+9)'], a:'(2x+3)(2x-3)', e:'4x²-9 = (2x)²-3² = (2x+3)(2x-3).'},
      {q:'Développer (x-7)²', o:['x²+49','x²-7x+49','x²-14x+49','x²-49'], a:'x²-14x+49', e:'(x-7)² = x²-2×7x+7² = x²-14x+49.'},
      {q:'Factoriser x²-1', o:['(x-1)²','(x+1)(x-1)','(x-1)(x+1)²','x(x-1)'], a:'(x+1)(x-1)', e:'x²-1 = x²-1² = (x+1)(x-1).'},
      {q:'Développer (a+b)²-(a-b)²', o:['2ab','4ab','0','2a²+2b²'], a:'4ab', e:'(a+b)²-(a-b)² = (a²+2ab+b²)-(a²-2ab+b²) = 4ab.'}
    ]
  },
  {
    id:'equations', name:'Équations et systèmes', icon:'⚖️', color:'#ef4444',
    desc:'Équations du 1er degré, systèmes à 2 inconnues',
    qs:[
      {q:'Résoudre 2x+5=13. Que vaut x?', o:['4','9','3','6'], a:'4', e:'2x=13-5=8, donc x=4.'},
      {q:'Résoudre 3x-7=8. Que vaut x?', o:['4','5','3','6'], a:'5', e:'3x=8+7=15, donc x=5.'},
      {q:'Résoudre 5x+3=2x+12. Que vaut x?', o:['2','4','3','5'], a:'3', e:'5x-2x=12-3 → 3x=9 → x=3.'},
      {q:'Résoudre -2x+10=4. Que vaut x?', o:['7','-7','3','-3'], a:'3', e:'-2x=4-10=-6, donc x=3.'},
      {q:'Système : x+y=10 et x-y=4. Que vaut x?', o:['3','7','8','6'], a:'7', e:'En additionnant : 2x=14 → x=7.'},
      {q:'Système : x+y=10 et x-y=4. Que vaut y?', o:['3','7','8','6'], a:'3', e:'x=7, donc y=10-7=3.'},
      {q:'Résoudre 4(x-2)=12. Que vaut x?', o:['5','4','3','7'], a:'5', e:'4x-8=12 → 4x=20 → x=5.'},
      {q:'Résoudre x/3+2=5. Que vaut x?', o:['6','9','3','12'], a:'9', e:'x/3=3 → x=9.'},
      {q:'Résoudre -3(2x+1)=-15. Que vaut x?', o:['2','-2','3','-3'], a:'2', e:'-6x-3=-15 → -6x=-12 → x=2.'},
      {q:'Résoudre 7x-3=4x+9. Que vaut x?', o:['4','2','6','3'], a:'4', e:'3x=12 → x=4.'},
      {q:'Système : 2x+y=7 et x-y=2. Que vaut x?', o:['2','3','4','1'], a:'3', e:'En additionnant : 3x=9 → x=3.'},
      {q:'Résoudre (x+3)/2=4. Que vaut x?', o:['5','8','11','3'], a:'5', e:'x+3=8 → x=5.'},
      {q:'Résoudre 5-3x=x+1. Que vaut x?', o:['1','2','-1','4'], a:'1', e:'-4x=-4 → x=1.'},
      {q:'Système : x+y=8 et 2x-y=4. Que vaut x?', o:['4','3','5','2'], a:'4', e:'3x=12 → x=4.'},
      {q:'Résoudre 2(3x-1)=5x+4. Que vaut x?', o:['6','4','3','2'], a:'6', e:'6x-2=5x+4 → x=6.'}
    ]
  },
  {
    id:'pythagore', name:'Théorème de Pythagore', icon:'📐', color:'#8b5cf6',
    desc:'Hypoténuse, réciproque, triplets pythagoriciens',
    qs:[
      {q:'Dans un triangle rectangle, l\'hypoténuse est…', o:['Le plus petit côté','Un des cathètes','Le côté opposé à l\'angle droit','Un côté quelconque'], a:'Le côté opposé à l\'angle droit', e:'L\'hypoténuse est toujours le côté le plus long, face à l\'angle droit.'},
      {q:'Cathètes a=3 et b=4. L\'hypoténuse c=?', o:['7','5','6','12'], a:'5', e:'c²=3²+4²=9+16=25, c=5. C\'est le triplet 3-4-5.'},
      {q:'Un triangle a pour côtés 5, 12, 13. Est-il rectangle?', o:['Non','Oui car 5²+12²=13²','Impossible à savoir','Oui car il a 3 côtés'], a:'Oui car 5²+12²=13²', e:'5²+12²=25+144=169=13². La réciproque confirme qu\'il est rectangle.'},
      {q:'Hypoténuse=10, cathète=6. L\'autre cathète=?', o:['4','6','8','9'], a:'8', e:'a²=10²-6²=100-36=64, a=8.'},
      {q:'Dans un carré de côté 5 cm, la diagonale mesure…', o:['5 cm','10 cm','5√2 ≈ 7,07 cm','25 cm'], a:'5√2 ≈ 7,07 cm', e:'d²=5²+5²=50, d=5√2 ≈ 7,07 cm.'},
      {q:'Un triangle a pour côtés 7, 24, 25. Est-il rectangle?', o:['Non','Oui','Seulement si l\'angle est mesuré','Impossible à dire'], a:'Oui', e:'7²+24²=49+576=625=25². C\'est un triplet pythagoricien.'},
      {q:'Rectangle de longueur 9 et largeur 12. La diagonale=?', o:['15','21','18','13'], a:'15', e:'9²+12²=81+144=225=15².'},

let ST = { screen:'home', topic:null, qs:[], idx:0, answers:[], answered:false };
const getScores = () => { try { return JSON.parse(localStorage.getItem('elyesMath')||'{}'); } catch { return {}; } };
const saveScore  = (id,s) => { const sc=getScores(); if(sc[id]===undefined||s>sc[id]){sc[id]=s;localStorage.setItem('elyesMath',JSON.stringify(sc));} };
function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function initHome() {
  document.getElementById('week-badge').textContent = weekLabel();
  const sc=getScores(); const grid=document.getElementById('topics-grid'); grid.innerHTML='';
  TOPICS.forEach(t => {
    const el=document.createElement('div'); el.className='topic-card'; el.style.setProperty('--tc',t.color);
    const best=sc[t.id];
    el.innerHTML=`<div class="tc-icon">${t.icon}</div><div class="tc-name">${t.name}</div><div class="tc-desc">${t.desc}</div>
      <div class="tc-meta"><span>10 questions · brevet</span>${best!==undefined?`<span class="tc-score">Meilleur : ${best}/10</span>`:'<span>Pas encore fait</span>'}</div>`;
    el.onclick=()=>startQuiz(t.id); grid.appendChild(el);
  });
}

function startQuiz(id) {
  const topic=TOPICS.find(t=>t.id===id); if(!topic) return;
  const rng=new SRNG(Date.now()^(Math.random()*0x100000000));
  const qs=rng.pick(topic.qs,10).map(q=>({...q,o:rng.shuffle(q.o)}));
  ST={screen:'quiz',topic,qs,idx:0,answers:[],answered:false};
  show('quiz-screen'); document.getElementById('quiz-title').textContent=`${topic.icon} ${topic.name}`; renderQ();
}
function retryQuiz() { startQuiz(ST.topic.id); }
function goHome() { show('home-screen'); }

function renderQ() {
  const {qs,idx}=ST; const q=qs[idx];
  document.getElementById('prog-fill').style.width=(idx/qs.length*100)+'%';
  document.getElementById('prog-txt').textContent=`${idx+1} / ${qs.length}`;
  const container=document.getElementById('q-container');
  container.innerHTML=`<div class="q-card"><div class="q-num">Question ${idx+1} sur ${qs.length}</div><div class="q-text" id="qtxt"></div><div class="opts-grid" id="opts"></div><div id="fb"></div></div><div id="nxt"></div>`;
  document.getElementById('qtxt').textContent=q.q;
  const LETTERS=['A','B','C','D'];
  q.o.forEach((opt,i)=>{
    const btn=document.createElement('button'); btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-letter">${LETTERS[i]}</span><span class="opt-text"></span>`;
    btn.querySelector('.opt-text').textContent=opt; btn.onclick=()=>pick(btn,opt); document.getElementById('opts').appendChild(btn);
  });
  ST.answered=false;
}

function pick(btn,val) {
  if(ST.answered) return; ST.answered=true;
  const q=ST.qs[ST.idx]; const correct=val===q.a;
  ST.answers.push({q:q.q,given:val,correct:q.a,ok:correct,e:q.e});
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.querySelector('.opt-text').textContent===q.a) b.classList.add('correct');
    else if(b===btn&&!correct) b.classList.add('wrong');
  });
  const fb=document.getElementById('fb');
  fb.className='feedback '+(correct?'ok':'err');
  fb.textContent=(correct?'✅ Correct ! ':'❌ Non. ')+q.e;
  const nxt=document.getElementById('nxt');
  const nb=document.createElement('button'); nb.className='next-btn';
  nb.textContent=ST.idx<ST.qs.length-1?'Question suivante →':'Voir mes résultats 🏁';
  nb.onclick=nextQ; nxt.appendChild(nb);
}

function nextQ() {
  ST.idx++;
  if(ST.idx<ST.qs.length) { renderQ(); return; }
  const score=ST.answers.filter(a=>a.ok).length;
  saveScore(ST.topic.id, score);
  showResults(score);
}

function showResults(score) {
  show('results-screen');
  const total=ST.qs.length, pct=score/total;
  document.getElementById('score-num').textContent=score;
  const arc=document.getElementById('score-arc');
  setTimeout(()=>{ arc.style.strokeDashoffset=377*(1-pct); },100);
  arc.style.stroke=pct>=0.8?'#10b981':pct>=0.5?'#f59e0b':'#ef4444';
  const msgs=[['😓','Encore un effort…','Révise les formules et recommence !'],['🙂','Pas mal !','Continue à t\'entraîner pour le brevet.'],['😊','Bien joué !','Tu maîtrises bien ce thème.'],['🌟','Excellent !','Tu es prêt(e) pour le brevet !']];
  const m=msgs[pct>=0.9?3:pct>=0.7?2:pct>=0.5?1:0];
  document.getElementById('res-msg').textContent=m[0]+' '+m[1];
  document.getElementById('res-sub').textContent=m[2];
  const rev=document.getElementById('review-list'); rev.innerHTML='';
  ST.answers.forEach(a=>{
    const d=document.createElement('div'); d.className='rev-item';
    d.innerHTML=`<span class="rev-icon">${a.ok?'✅':'❌'}</span><div><div class="rev-q">${a.q}</div><div class="rev-a ${a.ok?'ok-ans':'err-ans'}">${a.ok?'Bonne réponse : '+a.correct:'Ta réponse : '+a.given+' · Réponse : '+a.correct}${!a.ok&&a.e?'<div class="rev-exp">'+a.e+'</div>':''}</div></div>`;
    rev.appendChild(d);
  });
  sendResultEmail('Elyes', ST.topic.name, score, total, ST.answers);
  if(pct===1) confetti();
}

// ─── EmailJS ──────────────────────────────────────────────────
const EMAILJS_KEY      = 'CfrxX5NPbmE14wAmd';
const EMAILJS_PRIVATE_KEY = 'ehJuYOOg6elSKdIKyKKTz';
const EMAILJS_SERVICE  = 'service_NET_MAILS';
const EMAILJS_TEMPLATE = 'template_xfpfs3g';

function sendResultEmail(child, topic, score, total, answers) {
  const pct = score / total;
  const scoreColor = pct >= .8 ? '#10b981' : pct >= .6 ? '#f59e0b' : '#ef4444';
  const medal = pct >= .9 ? '🏆' : pct >= .7 ? '🌟' : pct >= .5 ? '👍' : '💪';
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const rows = answers.map((a, i) =>
    `<tr style="border-bottom:1px solid #e2e8f0;background:${a.ok?'#f0fdf4':'#fef2f2'}">
      <td style="padding:12px 14px;font-size:20px;vertical-align:top;width:36px">${a.ok?'✅':'❌'}</td>
      <td style="padding:12px 14px;font-family:sans-serif;vertical-align:top">
        <div style="font-weight:600;color:#1e293b;margin-bottom:4px">Q${i+1}. ${esc(a.q)}</div>
        <div style="font-size:13px;color:${a.ok?'#15803d':'#991b1b'}">Bonne réponse : <strong>${esc(a.correct)}</strong></div>
      </td>
    </tr>`
  ).join('');
  emailjs.init({ publicKey: EMAILJS_KEY, privateKey: EMAILJS_PRIVATE_KEY });
  emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
    child_name:  child,
    quiz_topic:  topic,
    score:       `${score} / ${total}`,
    score_color: scoreColor,
    medal:       medal,
    date:        new Date().toLocaleDateString('fr-FR', {weekday:'long',year:'numeric',month:'long',day:'numeric'}),
    rows:        rows
  })
  .then(() => console.log('EmailJS : envoi réussi'))
  .catch(e => console.warn('EmailJS : erreur', e));
}

function confetti() {
  const colors=['#f97316','#fbbf24','#34d399','#60a5fa','#a78bfa','#f472b6'];
  for(let i=0;i<60;i++) {
    const el=document.createElement('div'); el.className='conf';
    Object.assign(el.style,{left:Math.random()*100+'vw',width:Math.random()*8+4+'px',height:Math.random()*8+4+'px',background:colors[Math.floor(Math.random()*colors.length)],animationDuration:Math.random()*2+1.5+'s',animationDelay:Math.random()*0.8+'s'});
    document.body.appendChild(el); setTimeout(()=>el.remove(),4000);
  }
}

initHome();
