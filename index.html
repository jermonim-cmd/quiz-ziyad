  --card: #161630;

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);

}
body::before {

}

}
.nav-tab.geo  { background: rgba(124,58,237,.2);  color: #c4b5fd; border: 1px solid rgba(124,58,237,.4); }
.nav-tab.dec  { background: rgba(245,158,11,.12); color: #fcd34d; border: 1px solid rgba(245,158,11,.3); }
.nav-tab.sci  { background: rgba(5,150,105,.12);  color: #6ee7b7; border: 1px solid rgba(5,150,105,.3); }
.nav-tab.home { background: rgba(255,255,255,.07); color: var(--muted); border: 1px solid rgba(255,255,255,.12); }
.nav-tab.home:hover { background: rgba(255,255,255,.14); color: var(--text); }

.nav-tab.dec:hover { background: rgba(245,158,11,.25); }

/* ── HOME ── */

}

/* ── RESULTS ── */
#results-screen { max-width: 620px; margin: 0 auto; padding: 20px 20px 60px; }

.res-actions { display: flex; flex-direction: column; gap: 11px; }
.act-btn {

.act-btn:hover { opacity: .9; transform: translateY(-1px); }
.act-primary { background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; }
.act-secondary { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: var(--text); }

/* confetti */
.conf { position: fixed; border-radius: 3px; animation: fall linear forwards; z-index: 9999; pointer-events: none; }
@keyframes fall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}

<script>
// ─── Seeded RNG ───────────────────────────────────────────────
function SRNG(seed) {
  let s = seed >>> 0;
  this.next = () => { s = Math.imul(1664525, s) + 1013904223 >>> 0; return s / 0x100000000; };
  this.int  = n => Math.floor(this.next() * n);
  this.shuffle = a => {
    const r = [...a];
    for (let i = r.length - 1; i > 0; i--) { const j = this.int(i+1); [r[i],r[j]]=[r[j],r[i]]; }
    return r;
  };
  this.pick = (a, n) => this.shuffle(a).slice(0, n);
}

function weekSeed() {
  const d = new Date(), jan = new Date(d.getFullYear(), 0, 1);
  const wk = Math.floor((d - jan) / 86400000 / 7);
  return d.getFullYear() * 100 + wk;
}
function weekLabel() {
  const d = new Date(), jan = new Date(d.getFullYear(), 0, 1);
  const wk = Math.floor((d - jan) / 86400000 / 7) + 1;
  return `Semaine ${wk} · ${d.getFullYear()}`;
}

// ─── Question Bank ────────────────────────────────────────────
const TOPICS = [
  {
    id: 'angles', name: 'Angles et droites', icon: '📐', color: '#7c3aed',
    desc: 'Types d\'angles, complémentaires, supplémentaires, droites parallèles',
    qs: [
      { q:'Un angle de 65° est de type…', o:['Aigu','Droit','Obtus','Plat'], a:'Aigu',
        e:'Un angle aigu est compris entre 0° et 90°. Comme 65° < 90°, c\'est un angle aigu.' },
      { q:'Un angle de 130° est de type…', o:['Aigu','Droit','Obtus','Plat'], a:'Obtus',
        e:'Un angle obtus est compris entre 90° et 180°. 90° < 130° < 180° → obtus.' },
      { q:'Quel est le complément d\'un angle de 35°?', o:['55°','145°','45°','65°'], a:'55°',
        e:'Angles complémentaires → somme = 90°. Complément = 90° − 35° = 55°.' },
      { q:'Quel est le supplément d\'un angle de 110°?', o:['70°','80°','250°','90°'], a:'70°',
        e:'Angles supplémentaires → somme = 180°. Supplément = 180° − 110° = 70°.' },
      { q:'Deux droites perpendiculaires forment un angle de…', o:['45°','90°','180°','60°'], a:'90°',
        e:'Perpendiculaires = se croisent à angle droit = 90°.' },
      { q:'Vrai ou faux : Deux angles complémentaires peuvent tous deux être obtus.', o:['Vrai','Faux'], a:'Faux',
        e:'Leur somme serait > 180°, impossible pour deux angles dont la somme doit être 90°.' },
      { q:'A et B sont supplémentaires. Si A = 55°, alors B = ?', o:['35°','125°','115°','245°'], a:'125°',
        e:'A + B = 180° → B = 180° − 55° = 125°.' },
      { q:'Les angles alternes-internes formés par une sécante coupant deux parallèles sont…', o:['Supplémentaires','Complémentaires','Égaux','Quelconques'], a:'Égaux',
        e:'Propriété fondamentale des droites parallèles : les alternes-internes sont égaux.' },
      { q:'Les angles co-internes (même côté de la sécante) sont…', o:['Égaux','Complémentaires','Supplémentaires','Adjacents'], a:'Supplémentaires',
        e:'Les angles co-internes ont une somme de 180° (ils sont supplémentaires).' },
      { q:'Un angle droit mesure exactement…', o:['45°','60°','90°','180°'], a:'90°',
        e:'C\'est la définition d\'un angle droit.' },
      { q:'Quel est le complément de 72°?', o:['18°','108°','28°','72°'], a:'18°',
        e:'90° − 72° = 18°.' },
      { q:'Un angle plat mesure…', o:['90°','180°','270°','360°'], a:'180°',
        e:'Un angle plat correspond à une demi-rotation : 180°.' },
      { q:'Les angles correspondants (coupés par une sécante, droites parallèles) sont…', o:['Supplémentaires','Complémentaires','Égaux','Opposés'], a:'Égaux',
        e:'Angles correspondants = même position de chaque côté de la sécante → égaux.' },
      { q:'Deux angles adjacents partagent…', o:['Un côté commun et un sommet commun','Seulement un sommet','Seulement un côté','Rien'], a:'Un côté commun et un sommet commun',
        e:'Adjacents = même sommet + un côté commun, sans chevauchement.' },
      { q:'C = 42° et C, D sont complémentaires. Mesure de D?', o:['48°','138°','58°','42°'], a:'48°',
        e:'90° − 42° = 48°.' },
      { q:'Un tour complet mesure…', o:['180°','270°','360°','90°'], a:'360°',
        e:'Une révolution complète = 360°.' },
      { q:'Vrai ou faux : Deux droites parallèles se coupent en un point.', o:['Vrai','Faux'], a:'Faux',
        e:'Par définition, des droites parallèles ne se rencontrent jamais.' },
      { q:'Un angle de 89° est…', o:['Droit','Obtus','Aigu','Plat'], a:'Aigu',
        e:'89° < 90° → aigu.' },
      { q:'Quel est le supplément de 90°?', o:['0°','45°','90°','270°'], a:'90°',
        e:'180° − 90° = 90°. Le supplément d\'un angle droit est lui-même un angle droit!' },
      { q:'Vrai ou faux : Le supplément d\'un angle aigu est toujours obtus.', o:['Vrai','Faux'], a:'Vrai',
        e:'Si A est aigu (0°–90°), alors 180°−A est entre 90° et 180° → obtus.' },
      { q:'La somme des angles intérieurs d\'un triangle est…', o:['90°','180°','270°','360°'], a:'180°',
        e:'Propriété fondamentale : somme des angles d\'un triangle = 180°.' },
      { q:'À 3 h 00, les aiguilles d\'une horloge forment un angle…', o:['Aigu','Droit','Obtus','Plat'], a:'Droit',
        e:'À 3 h 00 les aiguilles sont perpendiculaires → angle droit = 90°.' },
      { q:'Quel est le complément de 75°?', o:['15°','105°','25°','85°'], a:'15°',
        e:'90° − 75° = 15°.' },
      { q:'Les angles opposés par le sommet (verticalement opposés) sont…', o:['Supplémentaires','Complémentaires','Égaux','Adjacents'], a:'Égaux',
        e:'Deux angles opposés par le sommet sont toujours égaux.' },
      { q:'Vrai ou faux : Un angle obtus peut mesurer 91°.', o:['Vrai','Faux'], a:'Vrai',
        e:'91° est entre 90° et 180° → c\'est bien un angle obtus.' }
    ]
  },
  {
    id: 'triangles', name: 'Triangles', icon: '🔺', color: '#dc2626',
    desc: 'Classification, périmètre, aire et propriétés des triangles',
    qs: [
      { q:'Un triangle dont tous les côtés sont égaux est un triangle…', o:['Isocèle','Scalène','Équilatéral','Rectangle'], a:'Équilatéral',
        e:'Équilatéral = 3 côtés égaux et 3 angles de 60°.' },
      { q:'Un triangle dont exactement deux côtés sont égaux est un triangle…', o:['Scalène','Équilatéral','Isocèle','Acutangle'], a:'Isocèle',
        e:'Isocèle = exactement 2 côtés (et 2 angles) égaux.' },
      { q:'Dans un triangle, A = 50° et B = 60°. Mesure de C?', o:['70°','80°','90°','60°'], a:'70°',

      { q:'Périmètre d\'un triangle équilatéral de côté 8 cm?', o:['16 cm','24 cm','32 cm','8 cm'], a:'24 cm',

      { q:'Aire d\'un triangle de base 10 cm et hauteur 6 cm?', o:['30 cm²','60 cm²','16 cm²','15 cm²'], a:'30 cm²',

      { q:'Un triangle rectangle a un angle de 90°. La somme des deux autres angles est…', o:['180°','90°','45°','270°'], a:'90°',
        e:'180° − 90° = 90°. Les deux angles aigus sont complémentaires.' },
      { q:'Un triangle dont tous les angles sont aigus est…', o:['Obtusangle','Rectangle','Acutangle','Isocèle'], a:'Acutangle',
        e:'Acutangle = les 3 angles sont strictement inférieurs à 90°.' },
      { q:'Triangle de côtés 3 cm, 4 cm, 5 cm — type selon les côtés?', o:['Équilatéral','Isocèle','Scalène','Impossible'], a:'Scalène',
        e:'3 ≠ 4 ≠ 5, tous différents → scalène.' },
      { q:'Vrai ou faux : Un triangle peut avoir deux angles droits.', o:['Vrai','Faux'], a:'Faux',
        e:'90° + 90° = 180°, le 3ᵉ angle serait 0° → impossible.' },
      { q:'Aire d\'un triangle de base 12 cm et hauteur 5 cm?', o:['60 cm²','30 cm²','17 cm²','34 cm²'], a:'30 cm²',
        e:'(12 × 5) ÷ 2 = 30 cm².' },
      { q:'Un triangle rectangle isocèle : les deux angles aigus mesurent chacun…', o:['30°','60°','45°','90°'], a:'45°',
        e:'(180° − 90°) ÷ 2 = 45°.' },
      { q:'Périmètre d\'un triangle isocèle = 34 cm, côtés égaux = 12 cm. Quelle est la base?', o:['10 cm','8 cm','12 cm','14 cm'], a:'10 cm',
        e:'34 = 2 × 12 + base → base = 10 cm.' },
      { q:'Triangle d\'angles 30°, 60°, 90° — type selon les angles?', o:['Acutangle','Rectangle','Obtusangle','Équilatéral'], a:'Rectangle',
        e:'Il contient un angle de 90° → rectangle.' },

let ST = { screen:'home', topic:null, qs:[], idx:0, answers:[], answered:false };

// ─── Scores ───────────────────────────────────────────────────
const getScores = () => { try { return JSON.parse(localStorage.getItem('geoQ') || '{}'); } catch { return {}; } };
const saveScore  = (id, s) => { const sc = getScores(); if (sc[id] === undefined || s > sc[id]) { sc[id]=s; localStorage.setItem('geoQ', JSON.stringify(sc)); } };

// ─── Screens ──────────────────────────────────────────────────
function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

// ─── Home ─────────────────────────────────────────────────────
function initHome() {
  document.getElementById('week-badge').textContent = weekLabel();
  const sc = getScores();
  const grid = document.getElementById('topics-grid');
  grid.innerHTML = '';
  TOPICS.forEach(t => {
    const el = document.createElement('div');
    el.className = 'topic-card';
    el.style.setProperty('--tc', t.color);
    const best = sc[t.id];
    el.innerHTML = `
      <div class="tc-icon">${t.icon}</div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-desc">${t.desc}</div>
      <div class="tc-meta">
        <span>10 questions · hebdo</span>
        ${best!==undefined ? `<span class="tc-score">Meilleur : ${best}/10</span>` : '<span>Pas encore fait</span>'}
      </div>`;
    el.onclick = () => startQuiz(t.id);
    grid.appendChild(el);
  });
}

// ─── Start quiz ───────────────────────────────────────────────
function startQuiz(id) {
  const topic = TOPICS.find(t=>t.id===id);
  if (!topic) return;
  const rng = new SRNG(Date.now() ^ (Math.random() * 0x100000000));
  const picked = rng.pick(topic.qs, 10);
  const qs = picked.map(q => ({ ...q, o: rng.shuffle(q.o) }));
  ST = { screen:'quiz', topic, qs, idx:0, answers:[], answered:false };
  show('quiz-screen');
  document.getElementById('quiz-title').textContent = `${topic.icon} ${topic.name}`;
  renderQ();
}

function retryQuiz() { startQuiz(ST.topic.id); }

// ─── Render question ──────────────────────────────────────────
function renderQ() {
  const { qs, idx } = ST;
  const q = qs[idx];
  const pct = (idx / qs.length) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = `${idx+1} / ${qs.length}`;

  const LETTERS = ['A','B','C','D'];
  const container = document.getElementById('q-container');
  container.innerHTML = `
    <div class="q-card">
      <div class="q-num">Question ${idx+1} sur ${qs.length}</div>
      <div class="q-text" id="qtxt"></div>
      <div class="opts-grid" id="opts"></div>
      <div id="fb"></div>
    </div>
    <div id="nxt"></div>`;

  document.getElementById('qtxt').textContent = q.q;

  const optsEl = document.getElementById('opts');
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span class="opt-text"></span>`;
    btn.querySelector('.opt-text').textContent = opt;
    btn.onclick = () => pick(btn, opt);
    optsEl.appendChild(btn);
  });

  ST.answered = false;
}

// ─── Pick answer ──────────────────────────────────────────────
function pick(btn, val) {
  if (ST.answered) return;
  ST.answered = true;
  const q = ST.qs[ST.idx];
  const ok = val === q.a;
  ST.answers.push({ q: q.q, sel: val, ok, correct: q.a, exp: q.e });

  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    const v = b.querySelector('.opt-text').textContent;
    if (v === q.a) b.classList.add('correct');
    else if (b === btn && !ok) b.classList.add('wrong');
  });

  const fb = document.getElementById('fb');
  fb.className = `feedback ${ok ? 'ok' : 'err'}`;
  const head = ok ? '✅ Bravo !' : `❌ Pas tout à fait — la bonne réponse est : ${q.a}`;
  fb.innerHTML = `<strong></strong><br><small></small>`;
  fb.querySelector('strong').textContent = head;
  fb.querySelector('small').textContent = q.e;

  const nxt = document.getElementById('nxt');
  const isLast = ST.idx === ST.qs.length - 1;
  const nxtBtn = document.createElement('button');
  nxtBtn.className = 'next-btn';
  nxtBtn.textContent = isLast ? '🏁 Voir les résultats' : 'Question suivante →';
  nxtBtn.onclick = isLast ? showResults : nextQ;
  nxt.appendChild(nxtBtn);
}

function nextQ() { ST.idx++; renderQ(); }

// ─── Results ──────────────────────────────────────────────────
function showResults() {
  const score = ST.answers.filter(a=>a.ok).length;
  saveScore(ST.topic.id, score);
  show('results-screen');

  // Animated arc
  const circ = 2 * Math.PI * 60; // ≈ 377
  const pct   = score / ST.qs.length;
  const col   = pct >= .8 ? '#10b981' : pct >= .6 ? '#f59e0b' : '#ef4444';
  const arc   = document.getElementById('score-arc');
  arc.setAttribute('stroke', col);
  arc.setAttribute('stroke-dasharray', circ);
  arc.setAttribute('stroke-dashoffset', circ);
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-num').style.color = col;
  setTimeout(() => {
    arc.style.transition = 'stroke-dashoffset 1s ease';
    arc.setAttribute('stroke-dashoffset', circ * (1 - pct));
  }, 50);

  // Message
  const msgs = [[9,'🌟 Excellent!','Tu maîtrises ce sujet parfaitement!'],[7,'🎉 Très bien!','Continue, tu es sur la bonne voie!'],[5,'💪 Pas mal!','Encore un peu de pratique et ce sera parfait!'],[0,'📚 Continue!','Relis tes notes et réessaie — tu vas y arriver!']];
  const [,m,s] = msgs.find(([min]) => score >= min);
  document.getElementById('res-msg').textContent = m;
  document.getElementById('res-sub').textContent = s;

  // Review
  const rl = document.getElementById('review-list');
  rl.innerHTML = '';
  ST.answers.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'rev-item';
    div.innerHTML = `
      <div class="rev-icon">${a.ok ? '✅' : '❌'}</div>
      <div>
        <div class="rev-q"><strong>Q${i+1}.</strong> <span class="rev-qtxt"></span></div>
        <div class="rev-a rev-atxt"></div>
      </div>`;
    div.querySelector('.rev-qtxt').textContent = a.q;
    if (a.ok) {
      div.querySelector('.rev-atxt').innerHTML = `<span class="ok-ans">Bonne réponse : </span><span class="ok-ans reans"></span>`;
      div.querySelector('.reans').textContent = a.correct;
    } else {
      div.querySelector('.rev-atxt').innerHTML = `<span class="err-ans">Ta réponse : <span class="sel"></span></span> · <span class="ok-ans">Bonne réponse : <span class="cor"></span></span>${a.exp ? '<div class="rev-exp"><span class="exp-txt"></span></div>' : ''}`;
      div.querySelector('.sel').textContent = a.sel;
      div.querySelector('.cor').textContent = a.correct;
      if (a.exp) div.querySelector('.exp-txt').textContent = a.exp;
    }
    rl.appendChild(div);
  });

  sendResultEmail('Ziyad', ST.topic.name, score, ST.qs.length, ST.answers);
  if (score >= 7) confetti();
}

// ─── EmailJS ──────────────────────────────────────────────────
const EMAILJS_KEY      = 'CfrxX5NPbmE14wAmd';
const EMAILJS_PRIVATE_KEY = 'ehJuYOOg6elSKdIKyKKTz';
const EMAILJS_SERVICE  = 'service_NET_MAILS';
const EMAILJS_TEMPLATE = 'template_xfpfs3g';

function sendResultEmail(child, topic, score, total, answers) {
  const pct = score / total;
  const scoreColor = pct >= .8 ? '#10b981' : pct >= .6 ? '#f59e0b' : '#ef4444';
  const medal = pct >= .9 ? '🏆' : pct >= .7 ? '🌟' : pct >= .5 ? '👍' : '💪';
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const rows = answers.map((a, i) =>
    `<tr style="border-bottom:1px solid #e2e8f0;background:${a.ok?'#f0fdf4':'#fef2f2'}">
      <td style="padding:12px 14px;font-size:20px;vertical-align:top;width:36px">${a.ok?'✅':'❌'}</td>
      <td style="padding:12px 14px;font-family:sans-serif;vertical-align:top">
        <div style="font-weight:600;color:#1e293b;margin-bottom:4px">Q${i+1}. ${esc(a.q)}</div>
        <div style="font-size:13px;color:${a.ok?'#15803d':'#991b1b'}">Bonne réponse : <strong>${esc(a.correct)}</strong></div>
      </td>
    </tr>`
  ).join('');
  emailjs.init({ publicKey: EMAILJS_KEY, privateKey: EMAILJS_PRIVATE_KEY });
  emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
    child_name:  child,
    quiz_topic:  topic,
    score:       `${score} / ${total}`,
    score_color: scoreColor,
    medal:       medal,
    date:        new Date().toLocaleDateString('fr-FR', {weekday:'long',year:'numeric',month:'long',day:'numeric'}),
    rows:        rows
  }).catch(e => console.warn('EmailJS:', e));
}

// ─── Confetti ─────────────────────────────────────────────────
function confetti() {
  const cols = ['#7c3aed','#4f46e5','#10b981','#f59e0b','#ef4444','#60a5fa','#f472b6'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'conf';
      const size = 6 + Math.random() * 9;
      c.style.cssText = `left:${Math.random()*100}vw;top:-12px;width:${size}px;height:${size}px;background:${cols[~~(Math.random()*cols.length)]};animation-duration:${2+Math.random()*2}s;border-radius:${Math.random()>.5?'50%':'3px'}`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4500);
    }, i * 45);
  }
}

// ─── Nav ──────────────────────────────────────────────────────
function goHome() { ST = {screen:'home',topic:null,qs:[],idx:0,answers:[],answered:false}; show('home-screen'); initHome(); }

// ─── Init ─────────────────────────────────────────────────────
initHome();

// ─── Register Service Worker (PWA) ───────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.log('SW error:', err));
  });
}
</script>
