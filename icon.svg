<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0d1b4a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="256" x2="512" y2="256" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Left half: Z for Ziyad (purple) -->
  <text x="138" y="310" font-family="'Segoe UI', Arial, sans-serif"
        font-size="220" font-weight="900" fill="url(#purple)"
        text-anchor="middle" opacity="0.95">Z</text>

  <!-- Right half: E for Elyes (orange) -->
  <text x="374" y="310" font-family="'Segoe UI', Arial, sans-serif"
        font-size="220" font-weight="900" fill="url(#orange)"
        text-anchor="middle" opacity="0.95">E</text>

  <!-- Divider line -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <!-- Sparkles -->
  <circle cx="80"  cy="80"  r="8" fill="#a78bfa" opacity="0.6"/>
  <circle cx="440" cy="70"  r="6" fill="#fb923c" opacity="0.6"/>
  <circle cx="460" cy="440" r="7" fill="#fb923c" opacity="0.4"/>
  <circle cx="55"  cy="430" r="5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="256" cy="460" r="5" fill="rgba(255,255,255,0.3)"/>
</svg>
