<style>
:root {
  --bg: #0f0d08;
  --card: #1e1a10;
  --text: #f0e8d8;
  --muted: #9a8f7a;
  --success: #10b981;
  --error: #ef4444;
  --acc: #06b6d4;
  --acc2: #0891b2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(6,182,212,.1) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(16,185,129,.07) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.screen { position: relative; z-index: 1; min-height: 100vh; display: none; }
.screen.active { display: block; }

/* ── TOP NAV ── */
.top-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: center; gap: 8px; padding: 10px 16px;
  background: rgba(15,13,8,.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(6,182,212,.12);
  flex-wrap: wrap;
}
.nav-tab {
  padding: 7px 20px; border-radius: 20px; font-size: .85rem; font-weight: 600;
  cursor: pointer; text-decoration: none; transition: all .2s; border: none; font-family: inherit;
}
.nav-tab.geo  { background: rgba(124,58,237,.15); color: #a78bfa; border: 1px solid rgba(124,58,237,.3); }
.nav-tab.dec  { background: rgba(245,158,11,.2);  color: #fcd34d; border: 1px solid rgba(245,158,11,.4); }
.nav-tab.sci  { background: rgba(5,150,105,.12);  color: #6ee7b7; border: 1px solid rgba(5,150,105,.3); }
.nav-tab.soc  { background: rgba(6,182,212,.15);  color: #22d3ee; border: 1px solid rgba(6,182,212,.3); }
.nav-tab.home { background: rgba(255,255,255,.07); color: var(--muted); border: 1px solid rgba(255,255,255,.12); }
.nav-tab.home:hover { background: rgba(255,255,255,.14); color: var(--text); }
.nav-tab.geo:hover { background: rgba(124,58,237,.3); }
.nav-tab.dec:hover { background: rgba(245,158,11,.35); }
.nav-tab.sci:hover { background: rgba(5,150,105,.28); }
.nav-tab.soc:hover { background: rgba(6,182,212,.3); }

/* ── HOME ── */
.home-header { text-align: center; padding: 90px 20px 24px; }
.home-header h1 {
  font-size: clamp(2rem, 6vw, 3rem); font-weight: 900; letter-spacing: -1px;
  background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);

}
.home-header .sub { color: var(--muted); margin-top: 6px; font-size: 1rem; }
.week-badge {
  display: inline-block; margin-top: 14px;
  background: rgba(6,182,212,.12); border: 1px solid rgba(6,182,212,.3);
  border-radius: 20px; padding: 5px 18px; font-size: .8rem; color: #22d3ee;
}
.topics-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
  gap: 16px; max-width: 960px; margin: 0 auto; padding: 16px 20px 60px;
}
.topic-card {
  background: var(--card); border-radius: 18px; padding: 26px 24px;
  cursor: pointer; border: 1px solid rgba(255,255,255,.05);
  transition: transform .25s, box-shadow .25s, border-color .25s;
  position: relative; overflow: hidden;
}
.topic-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--tc, #06b6d4);
}
.topic-card:hover {
  transform: translateY(-5px); border-color: rgba(255,255,255,.12);
  box-shadow: 0 24px 48px rgba(0,0,0,.4);
}
.tc-icon { font-size: 2.4rem; margin-bottom: 12px; }
.tc-name { font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
.tc-desc { color: var(--muted); font-size: .83rem; line-height: 1.5; }
.tc-meta {
  display: flex; justify-content: space-between; align-items: center;

.tc-score {

/* ── QUIZ ── */
#quiz-screen { max-width: 720px; margin: 0 auto; padding: 80px 20px 60px; }
.back-btn {
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09);

}

.quiz-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
.prog-row { display: flex; align-items: center; gap: 12px; margin-top: 12px; }

.opt-btn {

.opt-btn.wrong   { background: rgba(239,68,68,.14);  border-color: #ef4444;  }

.opt-letter {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;

  justify-content: center; font-size: .82rem; font-weight: 700;
}
.opt-btn.correct .opt-letter { background: rgba(16,185,129,.3); }
.opt-btn.wrong   .opt-letter { background: rgba(239,68,68,.3); }

.feedback {

.feedback.ok  { background: rgba(16,185,129,.1);  border: 1px solid rgba(16,185,129,.3);  color: #6ee7b7; }
.feedback.err { background: rgba(239,68,68,.1);   border: 1px solid rgba(239,68,68,.3);   color: #fca5a5; }
.next-btn {

  border: none; border-radius: 13px; color: #0f0d08;

/* ── RESULTS ── */
#results-screen { max-width: 620px; margin: 0 auto; padding: 80px 20px 60px; }
.res-top { text-align: center; padding: 20px 0 28px; }
.score-wrap {
  position: relative; width: 150px; height: 150px; margin: 0 auto 22px;
}
.score-svg { transform: rotate(-90deg); }
.score-bg  { fill: none; stroke: rgba(255,255,255,.06); stroke-width: 12; }
.score-arc { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
.score-inner {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;

.score-num { font-size: 2.8rem; font-weight: 900; line-height: 1; }

.res-msg { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }

.review-list { display: flex; flex-direction: column; gap: 11px; margin-bottom: 24px; }
.rev-item {

.rev-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.rev-q { font-size: .88rem; margin-bottom: 4px; line-height: 1.4; }
.rev-a { font-size: .8rem; }
.ok-ans  { color: #10b981; }
.err-ans { color: #ef4444; }
.rev-exp { margin-top: 5px; font-size: .78rem; color: #22d3ee; font-style: italic; line-height: 1.4; }

.res-actions { display: flex; flex-direction: column; gap: 11px; }
.act-btn {
  padding: 14px; border-radius: 13px; font-size: 1rem; font-weight: 700;
  cursor: pointer; border: none; font-family: inherit; transition: opacity .2s, transform .2s; width: 100%;
}
.act-btn:hover { opacity: .9; transform: translateY(-1px); }
.act-primary { background: linear-gradient(135deg, #06b6d4, #0891b2); color: #0f0d08; }
.act-secondary { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: var(--text); }

/* confetti */
.conf { position: fixed; border-radius: 3px; animation: fall linear forwards; z-index: 9999; pointer-events: none; }
@keyframes fall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}

<script>
// ─── Seeded RNG ───────────────────────────────────────────────
function SRNG(seed) {
  let s = seed >>> 0;
  this.next = () => { s = Math.imul(1664525, s) + 1013904223 >>> 0; return s / 0x100000000; };
  this.int  = n => Math.floor(this.next() * n);
  this.shuffle = a => {
    const r = [...a];
    for (let i = r.length - 1; i > 0; i--) { const j = this.int(i+1); [r[i],r[j]]=[r[j],r[i]]; }
    return r;
  };
  this.pick = (a, n) => this.shuffle(a).slice(0, n);
}
function weekSeed() {
  const d = new Date(), jan = new Date(d.getFullYear(), 0, 1);
  const wk = Math.floor((d - jan) / 86400000 / 7);
  return d.getFullYear() * 100 + wk;
}
function weekLabel() {
  const d = new Date(), jan = new Date(d.getFullYear(), 0, 1);
  const wk = Math.floor((d - jan) / 86400000 / 7) + 1;
  return `Semaine ${wk} · ${d.getFullYear()}`;
}

// ─── Question Bank ────────────────────────────────────────────
const TOPICS = [
  {
    id: 'introduction', name: 'Introduction', icon: '📖', color: '#06b6d4',
    desc: 'Les bases de l\'univers social et l\'étude des sociétés humaines',
    qs: [
      { q:'Un archéologue découvre des restes de repas datant de 40 000 ans. Ceci est une...', o:['Source secondaire','Source primaire','Archive officielle','Donnée géographique'], a:'Source primaire', e:'Les restes archéologiques du passé sont des sources primaires. Seule l\'analyse faite par les archéologues serait secondaire.' },
      { q:'Parmi ces disciplines, laquelle n\'est PAS part de l\'univers social au sens strict?', o:['L\'histoire économique','L\'anthropologie culturelle','L\'océanographie','La géopolitique'], a:'L\'océanographie', e:'L\'océanographie est une science naturelle. L\'univers social traite des sociétés humaines, pas des phénomènes purement physiques des océans.' },
      { q:'La géographie et l\'histoire se complètent parce que...', o:['Ce sont les deux seules sciences importantes','Les événements historiques dépendent du contexte géographique et inversement','Elles étudient les mêmes choses de manière différente','C\'est une convention des écoles québécoises'], a:'Les événements historiques dépendent du contexte géographique et inversement', e:'Exemple : la Révolution française a été influencée par les récoltes (climat = géographie) et a transformé les frontières européennes (histoire).' },
      { q:'Contrairement aux sources secondaires, les sources primaires...', o:['Sont toujours plus précises','Ont été créées à l\'époque des événements','Sont rédigées par des experts qualifiés','Ne peuvent jamais être biaisées'], a:'Ont été créées à l\'époque des événements', e:'Les sources primaires proviennent directement du moment historique étudié, mais peuvent être incomplètes ou biaisées selon le point de vue de leur auteur.' },
      { q:'Selon les historiens, une civilisation SANS écriture peut-elle exister?', o:['Non, l\'écriture est un critère obligatoire','Oui, selon certaines définitions qui valorisent le gouvernement et la technologie plutôt que l\'écriture','Seulement si elle a des monuments','Jamais, c\'est une contradiction logique'], a:'Oui, selon certaines définitions qui valorisent le gouvernement et la technologie plutôt que l\'écriture', e:'Les historiens débattent de la définition exacte de "civilisation". Certains acceptent l\'absence d\'écriture si d\'autres critères sont présents.' },
      { q:'Pourquoi la chronologie relative (avant/après) est-elle souvent insuffisante en archéologie?', o:['Elle est moins fiable que les dates écrites','Elle ne donne pas de dates précises, seulement un ordre','Elle s\'applique seulement aux ossements','Elle est obsolète depuis 2000'], a:'Elle ne donne pas de dates précises, seulement un ordre', e:'Connaître qu\'un événement est antérieur à un autre ne suffit pas toujours. Les historiens préfèrent les dates absolues (carbonne 14, archives datées).' },
      { q:'Qu\'est-ce qui limite TOUJOURS l\'interprétation des sources historiques?', o:['Le manque de documents modernes','Le point de vue et les biais de celui qui a créé la source','Le fait qu\'elles soient souvent écrites en latin','L\'impossibilité de les dater correctement'], a:'Le point de vue et les biais de celui qui a créé la source', e:'Chaque source historique reflète la perspective, les préjugés et les intérêts de son auteur. Les historiens doivent systématiquement corriger ces biais.' },
      { q:'La distinction entre histoire et géographie est PRINCIPALEMENT basée sur...', o:['L\'importance : l\'histoire est plus importante','Les périodes étudiées : l\'histoire ancien, la géographie moderne','La dimension (temps vs espace) et l\'approche méthodologique','Le pays d\'origine de la discipline'], a:'La dimension (temps vs espace) et l\'approche méthodologique', e:'L\'histoire analyseComment les événements se succèdent chronologiquement; la géographie comment les peuples et phénomènes se distribuent dans l\'espace.' },
      { q:'Lequel de ces éléments n\'est jamais une source historique valide?', o:['Un journal intime d\'époque','Les légendes orales transmises depuis 300 ans','Un témoignage d\'un événement donné','Une prédiction faite avant l\'événement'], a:'Une prédiction faite avant l\'événement', e:'Les sources historiques documentent ce qui S\'EST PASSÉ. Une prédiction future ne peut pas être une source sur un événement qui l\'a déjà eu lieu.' },
      { q:'En univers social, développer une "pensée critique" signifie principalement...', o:['Critiquer tout ce qu\'on lit','Analyser les sources, identifier les biais et tirer des conclusions nuancées','Mémoriser les opinions des grands historiens','Choisir toujours la réponse opposée à celle qu\'on propose'], a:'Analyser les sources, identifier les biais et tirer des conclusions nuancées', e:'C\'est l\'apport spécifique de l\'univers social : développer une capacité à évaluer les preuves et former ses propres jugements informés.' }
    ]
  },
  {
    id: 'sedentarisation', name: 'Sédentarisation', icon: '🏘️', color: '#0891b2',
    desc: 'Le passage du nomadisme à la vie sédentaire et l\'agriculture',
    qs: [
      { q:'Pourquoi la sédentarisation n\'a-t-elle PAS commencé immédiatement après la découverte de l\'agriculture?', o:['Les peuples ne comprenaient pas l\'agriculture','Il fallait accumuler suffisamment de surplus alimentaire pour que les gens quittent le nomadisme','L\'agriculture était trop difficile au départ','C\'était un tabou religieux'], a:'Il fallait accumuler suffisamment de surplus alimentaire pour que les gens quittent le nomadisme', e:'La sédentarisation était un processus lent. Les surplus agricoles devaient être assez abondants pour justifier l\'abandon de la chasse-cueillette.' },
      { q:'Quelle était une CONSÉQUENCE NÉGATIVE de la sédentarisation?', o:['Les gens s\'ennuyaient','Augmentation des maladies infectieuses dues à la concentration de population','Moins de variété alimentaire','Tous les nomades devenaient guerriers'], a:'Augmentation des maladies infectieuses dues à la concentration de population', e:'Les villages denses favorisaient la transmission des maladies. C\'est un problème documenté archéologiquement (malnutrition, épidémies).' },
      { q:'Comparée aux nomades, la vie de l\'agriculteur sédentaire était...', o:['Entièrement meilleure','Plus stable alimentairement mais nécessitait plus de travail pour un apport nutritif similaire','Plus facile car l\'agriculture ne demande pas d\'effort','Identique au nomadisme'], a:'Plus stable alimentairement mais nécessitait plus de travail pour un apport nutritif similaire', e:'Paradoxe historique : les agriculteurs travaillaient davantage que les chasseurs-cueilleurs pour une nutrition moins variée.' },
      { q:'Le Croissant fertile a été le "berceau" de l\'agriculture parce que...', o:['C\'était le seul endroit au monde','Ses conditions climat et géographie (fleuves, sols riches, plantes sauvages domesticables) étaient favorables','Les gens y étaient plus intelligents','Les dieux l\'avaient choisi'], a:'Ses conditions climat et géographie (fleuves, sols riches, plantes sauvages domesticables) étaient favorables', e:'L\'agriculture nécessite des plants sauvages domesticables et un climat stable. Le Croissant fertile avait l\'orge et le blé sauvages.' },
      { q:'Lequel de ces éléments n\'a PAS suivi directement la sédentarisation?', o:['L\'émergence de gouvernements organisés','L\'apparition d\'un système d\'écriture','L\'invention du microscope','La stratification sociale (riches/pauvres)'], a:'L\'invention du microscope', e:'Le microscope n\'a été inventé que vers 1600. La sédentarisation date de -10 000 ans. Les trois autres éléments ont émergé avec les sociétés agricoles.' },

// ─── State ────────────────────────────────────────────────────
let ST = { screen:'home', topic:null, qs:[], idx:0, answers:[], answered:false };
const getScores = () => { try { return JSON.parse(localStorage.getItem('socialQ') || '{}'); } catch { return {}; } };
const saveScore  = (id, s) => { const sc = getScores(); if (sc[id] === undefined || s > sc[id]) { sc[id]=s; localStorage.setItem('socialQ', JSON.stringify(sc)); } };

// ─── Screens ──────────────────────────────────────────────────
function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

// ─── Home ─────────────────────────────────────────────────────
function initHome() {
  document.getElementById('week-badge').textContent = weekLabel();
  const sc = getScores();
  const grid = document.getElementById('topics-grid');
  grid.innerHTML = '';
  TOPICS.forEach(t => {
    const el = document.createElement('div');
    el.className = 'topic-card';
    el.style.setProperty('--tc', t.color);
    const best = sc[t.id];
    el.innerHTML = `
      <div class="tc-icon">${t.icon}</div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-desc">${t.desc}</div>
      <div class="tc-meta">
        <span>10 questions · hebdo</span>
        ${best!==undefined ? `<span class="tc-score">Meilleur : ${best}/10</span>` : '<span>Pas encore fait</span>'}
      </div>`;
    el.onclick = () => startQuiz(t.id);
    grid.appendChild(el);
  });
}

// ─── Start quiz ───────────────────────────────────────────────
function startQuiz(id) {
  const topic = TOPICS.find(t=>t.id===id);
  if (!topic) return;
  const rng = new SRNG(Date.now() ^ (Math.random() * 0x100000000));
  const picked = rng.pick(topic.qs, 10);
  const qs = picked.map(q => ({ ...q, o: rng.shuffle(q.o) }));
  ST = { topic, qs, idx:0, answers:[], answered:false };
  show('quiz-screen');
  document.getElementById('quiz-title').textContent = `${topic.icon} ${topic.name}`;
  renderQ();
}
function retryQuiz() { startQuiz(ST.topic.id); }

// ─── Render question ──────────────────────────────────────────
function renderQ() {
  const { qs, idx } = ST;
  const q = qs[idx];
  document.getElementById('prog-fill').style.width = (idx / qs.length * 100) + '%';
  document.getElementById('prog-txt').textContent = `${idx+1} / ${qs.length}`;

  const container = document.getElementById('q-container');
  container.innerHTML = `
    <div class="q-card">
      <div class="q-num">Question ${idx+1} sur ${qs.length}</div>
      <div class="q-text" id="qtxt"></div>
      <div class="opts-grid" id="opts"></div>
      <div id="fb"></div>
    </div>
    <div id="nxt"></div>`;

  document.getElementById('qtxt').textContent = q.q;

  const LETTERS = ['A','B','C','D'];
  const optsEl = document.getElementById('opts');
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span class="opt-text"></span>`;
    btn.querySelector('.opt-text').textContent = opt;
    btn.onclick = () => pick(btn, opt);
    optsEl.appendChild(btn);
  });
  ST.answered = false;
}

// ─── Pick ─────────────────────────────────────────────────────
function pick(btn, val) {
  if (ST.answered) return;
  ST.answered = true;
  const q = ST.qs[ST.idx];
  const ok = val === q.a;
  ST.answers.push({ q: q.q, sel: val, ok, correct: q.a, exp: q.e });

  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    const v = b.querySelector('.opt-text').textContent;
    if (v === q.a) b.classList.add('correct');
    else if (b === btn && !ok) b.classList.add('wrong');
  });

  const fb = document.getElementById('fb');
  fb.className = `feedback ${ok ? 'ok' : 'err'}`;
  const head = ok ? '✅ Bravo !' : `❌ Pas tout à fait — la bonne réponse est : ${q.a}`;
  fb.innerHTML = `<strong></strong><br><small></small>`;
  fb.querySelector('strong').textContent = head;
  fb.querySelector('small').textContent = q.e;

  const nxt = document.getElementById('nxt');
  const isLast = ST.idx === ST.qs.length - 1;
  const nxtBtn = document.createElement('button');
  nxtBtn.className = 'next-btn';
  nxtBtn.textContent = isLast ? '🏁 Voir les résultats' : 'Question suivante →';
  nxtBtn.onclick = isLast ? showResults : nextQ;
  nxt.appendChild(nxtBtn);
}

function nextQ() { ST.idx++; renderQ(); }

// ─── Results ──────────────────────────────────────────────────
function showResults() {
  const score = ST.answers.filter(a=>a.ok).length;
  saveScore(ST.topic.id, score);
  show('results-screen');

  const circ = 2 * Math.PI * 60;
  const pct  = score / ST.qs.length;
  const col  = pct >= .8 ? '#10b981' : pct >= .6 ? '#06b6d4' : '#ef4444';
  const arc  = document.getElementById('score-arc');
  arc.setAttribute('stroke', col);
  arc.setAttribute('stroke-dasharray', circ);
  arc.setAttribute('stroke-dashoffset', circ);
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-num').style.color = col;
  setTimeout(() => {
    arc.style.transition = 'stroke-dashoffset 1s ease';
    arc.setAttribute('stroke-dashoffset', circ * (1 - pct));
  }, 50);

  const msgs = [[9,'🌟 Excellent!','Maîtrise parfaite de l\'univers social!'],[7,'🎉 Très bien!','Tu comprends bien ces sujets!'],[5,'💪 Pas mal!','Continue ta préparation pour l\'examen!'],[0,'📚 Continue!','Relis tes notes et réessaie!']];
  const [,m,s] = msgs.find(([min]) => score >= min);
  document.getElementById('res-msg').textContent = m;
  document.getElementById('res-sub').textContent = s;

  const rl = document.getElementById('review-list');
  rl.innerHTML = '';
  ST.answers.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'rev-item';
    div.innerHTML = `
      <div class="rev-icon">${a.ok ? '✅' : '❌'}</div>
      <div>
        <div class="rev-q"><strong>Q${i+1}.</strong> <span class="rev-qtxt"></span></div>
        <div class="rev-a rev-atxt"></div>
      </div>`;
    div.querySelector('.rev-qtxt').textContent = a.q;
    if (a.ok) {
      div.querySelector('.rev-atxt').innerHTML = `<span class="ok-ans">Bonne réponse : <span class="r"></span></span>`;
      div.querySelector('.r').textContent = a.correct;
    } else {
      div.querySelector('.rev-atxt').innerHTML = `<span class="err-ans">Ta réponse : <span class="s"></span></span> · <span class="ok-ans">Bonne : <span class="c"></span></span>${a.exp ? '<div class="rev-exp"><span class="exp-txt"></span></div>' : ''}`;
      div.querySelector('.s').textContent = a.sel;
      div.querySelector('.c').textContent = a.correct;
      if (a.exp) div.querySelector('.exp-txt').textContent = a.exp;
    }
    rl.appendChild(div);
  });

  sendResultEmail('Ziyad', ST.topic.name, score, ST.qs.length, ST.answers);
  if (score >= 7) confetti();
}

// ─── EmailJS ──────────────────────────────────────────────────
const EMAILJS_KEY      = 'CfrxX5NPbmE14wAmd';
const EMAILJS_PRIVATE_KEY = 'ehJuYOOg6elSKdIKyKKTz';
const EMAILJS_SERVICE  = 'service_NET_MAILS';
const EMAILJS_TEMPLATE = 'template_xfpfs3g';

function sendResultEmail(child, topic, score, total, answers) {
  const pct = score / total;
  const scoreColor = pct >= .8 ? '#10b981' : pct >= .6 ? '#06b6d4' : '#ef4444';
  const medal = pct >= .9 ? '🏆' : pct >= .7 ? '🌟' : pct >= .5 ? '👍' : '💪';
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const rows = answers.map((a, i) =>
    `<tr style="border-bottom:1px solid #e2e8f0;background:${a.ok?'#f0fdf4':'#fef2f2'}">
      <td style="padding:12px 14px;font-size:20px;vertical-align:top;width:36px">${a.ok?'✅':'❌'}</td>
      <td style="padding:12px 14px;font-family:sans-serif;vertical-align:top">
        <div style="font-weight:600;color:#1e293b;margin-bottom:4px">Q${i+1}. ${esc(a.q)}</div>
        <div style="font-size:13px;color:${a.ok?'#15803d':'#991b1b'}">Bonne réponse : <strong>${esc(a.correct)}</strong></div>
      </td>
    </tr>`
  ).join('');
  emailjs.init({ publicKey: EMAILJS_KEY, privateKey: EMAILJS_PRIVATE_KEY });
  emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
    child_name:  child,
    quiz_topic:  topic,
    score:       `${score} / ${total}`,
    score_color: scoreColor,
    medal:       medal,
    date:        new Date().toLocaleDateString('fr-FR', {weekday:'long',year:'numeric',month:'long',day:'numeric'}),
    rows:        rows
  })
  .then(() => console.log('EmailJS : envoi réussi'))
  .catch(e => console.warn('EmailJS : erreur', e));
}

function confetti() {
  const cols = ['#06b6d4','#0891b2','#10b981','#ef4444','#60a5fa','#f472b6','#22d3ee'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'conf';
      const size = 6 + Math.random() * 9;
      c.style.cssText = `left:${Math.random()*100}vw;top:-12px;width:${size}px;height:${size}px;background:${cols[~~(Math.random()*cols.length)]};animation-duration:${2+Math.random()*2}s;border-radius:${Math.random()>.5?'50%':'3px'}`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4500);
    }, i * 45);
  }
}

function goHome() { ST = {topic:null,qs:[],idx:0,answers:[],answered:false}; show('home-screen'); initHome(); }

initHome();
