:root {
  --bg: #0f0d08;
  --card: #1e1a10;

  --muted: #9a8f7a;
  --success: #10b981;
  --error: #ef4444;
  --acc: #06b6d4;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);

  overflow-x: hidden;

body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(6,182,212,.1) 0%, transparent 60%),

}
.screen { position: relative; z-index: 1; min-height: 100vh; display: none; }
.screen.active { display: block; }

/* ── TOP NAV ── */

}

}

.nav-tab.dec  { background: rgba(245,158,11,.2);  color: #fcd34d; border: 1px solid rgba(245,158,11,.4); }
.nav-tab.sci  { background: rgba(5,150,105,.12);  color: #6ee7b7; border: 1px solid rgba(5,150,105,.3); }
.nav-tab.soc  { background: rgba(6,182,212,.15);  color: #22d3ee; border: 1px solid rgba(6,182,212,.3); }
.nav-tab.home { background: rgba(255,255,255,.07); color: var(--muted); border: 1px solid rgba(255,255,255,.12); }
.nav-tab.home:hover { background: rgba(255,255,255,.14); color: var(--text); }

.nav-tab.dec:hover { background: rgba(245,158,11,.35); }

  background: var(--card); border-radius: 18px; padding: 26px 24px;

}
.topic-card::before {

}

}

.opt-btn.wrong   { background: rgba(239,68,68,.14);  border-color: #ef4444;  }

/* ── RESULTS ── */
#results-screen { max-width: 620px; margin: 0 auto; padding: 80px 20px 60px; }
.res-top { text-align: center; padding: 20px 0 28px; }
.score-wrap {

.res-actions { display: flex; flex-direction: column; gap: 11px; }
.act-btn {

.act-secondary { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: var(--text); }

/* confetti */

  100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }

<script>
// ─── Seeded RNG ───────────────────────────────────────────────
function SRNG(seed) {
  let s = seed >>> 0;
  this.next = () => { s = Math.imul(1664525, s) + 1013904223 >>> 0; return s / 0x100000000; };
  this.int  = n => Math.floor(this.next() * n);
  this.shuffle = a => {
    const r = [...a];
    for (let i = r.length - 1; i > 0; i--) { const j = this.int(i+1); [r[i],r[j]]=[r[j],r[i]]; }
    return r;
  };
  this.pick = (a, n) => this.shuffle(a).slice(0, n);
}
function weekSeed() {
  const d = new Date(), jan = new Date(d.getFullYear(), 0, 1);
  const wk = Math.floor((d - jan) / 86400000 / 7);
  return d.getFullYear() * 100 + wk;
}
function weekLabel() {
  const d = new Date(), jan = new Date(d.getFullYear(), 0, 1);
  const wk = Math.floor((d - jan) / 86400000 / 7) + 1;
  return `Semaine ${wk} · ${d.getFullYear()}`;
}

// ─── Question Bank ────────────────────────────────────────────
const TOPICS = [
  {
    id: 'introduction', name: 'Introduction', icon: '📖', color: '#06b6d4',
    desc: 'Les bases de l\'univers social et l\'étude des sociétés humaines',
    qs: [
      { q:'Qu\'est-ce que l\'univers social?', o:['L\'étude des planètes','L\'étude des sociétés humaines et de leurs interactions','L\'étude des mathématiques','L\'étude de la physique'], a:'L\'étude des sociétés humaines et de leurs interactions', e:'L\'univers social englobe l\'histoire (l\'étude du passé) et la géographie (l\'étude de l\'espace et des populations). Ces disciplines nous aident à comprendre comment les sociétés se développent et interagissent avec leur environnement.' },
      { q:'Quels domaines compose l\'univers social?', o:['Mathématiques et sciences','Histoire et géographie','Littérature et poésie','Musique et arts'], a:'Histoire et géographie', e:'L\'univers social s\'organise principalement autour de l\'histoire (l\'étude des événements passés) et de la géographie (l\'étude de l\'espace, des populations et des cultures). Ces deux domaines se complètent pour une compréhension globale des sociétés.' },
      { q:'Pourquoi étudions-nous les sociétés passées?', o:['Pour passer l\'examen','Pour comprendre notre présent et préparer notre avenir','Pour mémoriser des dates','Pour apprendre des langues'], a:'Pour comprendre notre présent et préparer notre avenir', e:'L\'étude du passé nous permet de mieux comprendre comment les sociétés se sont développées et comment les décisions historiques influencent notre vie actuelle. C\'est essentiel pour prendre des décisions éclairées à l\'avenir.' },
      { q:'Qu\'est-ce que la géographie humaine?', o:['L\'étude des montagnes','L\'étude des populations, de leur culture et de leurs territoires','L\'étude de la météo','L\'étude des animaux'], a:'L\'étude des populations, de leur culture et de leurs territoires', e:'La géographie humaine s\'intéresse aux peuples et à leurs interactions avec l\'espace.' },
      { q:'Quel est le principal objectif de l\'étude de l\'univers social?', o:['Mémoriser toutes les dates','Devenir historien obligatoirement','Développer une compréhension du monde et des sociétés','Apprendre par cœur tous les noms de villes'], a:'Développer une compréhension du monde et des sociétés', e:'L\'objectif est de développer la pensée critique et la compréhension du monde.' },
      { q:'Qu\'est-ce qu\'une civilisation?', o:['Un groupe de personnes vivant à côté','Une société organisée avec culture, gouvernement et technologie','Un continent','Un pays'], a:'Une société organisée avec culture, gouvernement et technologie', e:'Une civilisation est un groupe de personnes qui partagent une culture commune, un système de gouvernement organisé, une forme d\'écriture, une technologie avancée et des institutions sociales. Exemples : l\'Égypte antique, la Mésopotamie.' },
      { q:'Comment les sources historiques nous aident-elles?', o:['Elles créent des mensonges','Elles nous aident à reconstituer le passé','Elles sont toutes fausses','Elles ne servent à rien'], a:'Elles nous aident à reconstituer le passé', e:'Les sources historiques (documents, objets) témoignent de la vie passée.' },
      { q:'Qu\'est-ce que la chronologie?', o:['L\'étude des chronomètres','L\'ordre des événements dans le temps','L\'étude des religions','L\'étude du climat'], a:'L\'ordre des événements dans le temps', e:'La chronologie classe les événements du plus ancien au plus récent.' },
      { q:'Quel est le rôle de la géographie?', o:['Enseigner la géométrie','Expliquer les relations entre les humains et leur environnement','Apprendre l\'astronomie','Étudier les sports'], a:'Expliquer les relations entre les humains et leur environnement', e:'La géographie étudie comment les humains vivent sur la Terre.' },
      { q:'Qu\'est-ce qui distingue une source primaire d\'une source secondaire?', o:['Les sources primaires sont toujours vraies','Les sources primaires sont des documents d\'époque; les secondaires sont des analyses ultérieures','Les sources secondaires sont plus vieilles','Il n\'y a pas de différence'], a:'Les sources primaires sont des documents d\'époque; les secondaires sont des analyses ultérieures', e:'Les sources primaires viennent de l\'époque étudiée; les secondaires les analysent.' }
    ]
  },
  {
    id: 'sedentarisation', name: 'Sédentarisation', icon: '🏘️', color: '#0891b2',
    desc: 'Le passage du nomadisme à la vie sédentaire et l\'agriculture',
    qs: [
      { q:'Qu\'est-ce que la sédentarisation?', o:['Rester assis longtemps','Le passage du nomadisme à la vie fixe','Un type de danse','L\'étude de la géologie'], a:'Le passage du nomadisme à la vie fixe', e:'La sédentarisation est le processus par lequel les peuples deviennent fixes en un lieu.' },
      { q:'Pourquoi les peuples se sont-ils sédentarisés?', o:['Par ennui','Pour élever du bétail et cultiver la terre','Pour faire la guerre','Par hasard'], a:'Pour élever du bétail et cultiver la terre', e:'Le développement de l\'agriculture et l\'élevage ont permis aux peuples de s\'installer.' },
      { q:'Qu\'est-ce qu\'un nomade?', o:['Une personne qui vit dans les villes','Une personne qui se déplace continuellement pour se nourrir','Un guerrier','Un marchand'], a:'Une personne qui se déplace continuellement pour se nourrir', e:'Les nomades sont des peuples sans habitat fixe qui suivent les ressources.' },
      { q:'Quand la sédentarisation a-t-elle commencé?', o:['Au Moyen Âge','Il y a 10 000 ans avec la révolution néolithique','À la préhistoire récente','Il y a seulement 1 000 ans'], a:'Il y a 10 000 ans avec la révolution néolithique', e:'La révolution néolithique (Néolithique) a commencé il y a environ 10 000 ans. Cette période marque le passage décisif de la chasse-cueillette à l\'agriculture, permettant aux humains de s\'installer en permanence dans un lieu.' },
      { q:'Qu\'est-ce que la révolution néolithique?', o:['Une guerre importante','Le passage de la chasse-cueillette à l\'agriculture','L\'invention des villes','L\'arrivée du fer'], a:'Le passage de la chasse-cueillette à l\'agriculture', e:'La révolution néolithique est une transformation majeure où les humains abandonnent la vie nomade pour cultiver des plantes et élever des animaux. Cela a permis l\'accumulation de surplus alimentaires et la création de sociétés plus complexes.' },

  {

// ─── State ────────────────────────────────────────────────────
let ST = { screen:'home', topic:null, qs:[], idx:0, answers:[], answered:false };
const getScores = () => { try { return JSON.parse(localStorage.getItem('socialQ') || '{}'); } catch { return {}; } };
const saveScore  = (id, s) => { const sc = getScores(); if (sc[id] === undefined || s > sc[id]) { sc[id]=s; localStorage.setItem('socialQ', JSON.stringify(sc)); } };

// ─── Screens ──────────────────────────────────────────────────
function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

// ─── Home ─────────────────────────────────────────────────────
function initHome() {
  document.getElementById('week-badge').textContent = weekLabel();
  const sc = getScores();
  const grid = document.getElementById('topics-grid');
  grid.innerHTML = '';
  TOPICS.forEach(t => {
    const el = document.createElement('div');
    el.className = 'topic-card';
    el.style.setProperty('--tc', t.color);
    const best = sc[t.id];
    el.innerHTML = `
      <div class="tc-icon">${t.icon}</div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-desc">${t.desc}</div>
      <div class="tc-meta">
        <span>10 questions · hebdo</span>
        ${best!==undefined ? `<span class="tc-score">Meilleur : ${best}/10</span>` : '<span>Pas encore fait</span>'}
      </div>`;
    el.onclick = () => startQuiz(t.id);
    grid.appendChild(el);
  });
}

// ─── Start quiz ───────────────────────────────────────────────
function startQuiz(id) {
  const topic = TOPICS.find(t=>t.id===id);
  if (!topic) return;
  const rng = new SRNG(Date.now() ^ (Math.random() * 0x100000000));
  const picked = rng.pick(topic.qs, 10);
  const qs = picked.map(q => ({ ...q, o: rng.shuffle(q.o) }));
  ST = { topic, qs, idx:0, answers:[], answered:false };
  show('quiz-screen');
  document.getElementById('quiz-title').textContent = `${topic.icon} ${topic.name}`;
  renderQ();
}
function retryQuiz() { startQuiz(ST.topic.id); }

// ─── Render question ──────────────────────────────────────────
function renderQ() {
  const { qs, idx } = ST;
  const q = qs[idx];
  document.getElementById('prog-fill').style.width = (idx / qs.length * 100) + '%';
  document.getElementById('prog-txt').textContent = `${idx+1} / ${qs.length}`;

  const container = document.getElementById('q-container');
  container.innerHTML = `
    <div class="q-card">
      <div class="q-num">Question ${idx+1} sur ${qs.length}</div>
      <div class="q-text" id="qtxt"></div>
      <div class="opts-grid" id="opts"></div>
      <div id="fb"></div>
    </div>
    <div id="nxt"></div>`;

  document.getElementById('qtxt').textContent = q.q;

  const LETTERS = ['A','B','C','D'];
  const optsEl = document.getElementById('opts');
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span class="opt-text"></span>`;
    btn.querySelector('.opt-text').textContent = opt;
    btn.onclick = () => pick(btn, opt);
    optsEl.appendChild(btn);
  });
  ST.answered = false;
}

// ─── Pick ─────────────────────────────────────────────────────
function pick(btn, val) {
  if (ST.answered) return;
  ST.answered = true;
  const q = ST.qs[ST.idx];
  const ok = val === q.a;
  ST.answers.push({ q: q.q, sel: val, ok, correct: q.a, exp: q.e });

  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    const v = b.querySelector('.opt-text').textContent;
    if (v === q.a) b.classList.add('correct');
    else if (b === btn && !ok) b.classList.add('wrong');
  });

  const fb = document.getElementById('fb');
  fb.className = `feedback ${ok ? 'ok' : 'err'}`;
  const head = ok ? '✅ Bravo !' : `❌ Pas tout à fait — la bonne réponse est : ${q.a}`;
  fb.innerHTML = `<strong></strong><br><small></small>`;
  fb.querySelector('strong').textContent = head;
  fb.querySelector('small').textContent = q.e;

  const nxt = document.getElementById('nxt');
  const isLast = ST.idx === ST.qs.length - 1;
  const nxtBtn = document.createElement('button');
  nxtBtn.className = 'next-btn';
  nxtBtn.textContent = isLast ? '🏁 Voir les résultats' : 'Question suivante →';
  nxtBtn.onclick = isLast ? showResults : nextQ;
  nxt.appendChild(nxtBtn);
}

function nextQ() { ST.idx++; renderQ(); }

// ─── Results ──────────────────────────────────────────────────
function showResults() {
  const score = ST.answers.filter(a=>a.ok).length;
  saveScore(ST.topic.id, score);
  show('results-screen');

  const circ = 2 * Math.PI * 60;
  const pct  = score / ST.qs.length;
  const col  = pct >= .8 ? '#10b981' : pct >= .6 ? '#06b6d4' : '#ef4444';
  const arc  = document.getElementById('score-arc');
  arc.setAttribute('stroke', col);
  arc.setAttribute('stroke-dasharray', circ);
  arc.setAttribute('stroke-dashoffset', circ);
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-num').style.color = col;
  setTimeout(() => {
    arc.style.transition = 'stroke-dashoffset 1s ease';
    arc.setAttribute('stroke-dashoffset', circ * (1 - pct));
  }, 50);

  const msgs = [[9,'🌟 Excellent!','Maîtrise parfaite de l\'univers social!'],[7,'🎉 Très bien!','Tu comprends bien ces sujets!'],[5,'💪 Pas mal!','Continue ta préparation pour l\'examen!'],[0,'📚 Continue!','Relis tes notes et réessaie!']];
  const [,m,s] = msgs.find(([min]) => score >= min);
  document.getElementById('res-msg').textContent = m;
  document.getElementById('res-sub').textContent = s;

  const rl = document.getElementById('review-list');
  rl.innerHTML = '';
  ST.answers.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'rev-item';
    div.innerHTML = `
      <div class="rev-icon">${a.ok ? '✅' : '❌'}</div>
      <div>
        <div class="rev-q"><strong>Q${i+1}.</strong> <span class="rev-qtxt"></span></div>
        <div class="rev-a rev-atxt"></div>
      </div>`;
    div.querySelector('.rev-qtxt').textContent = a.q;
    if (a.ok) {
      div.querySelector('.rev-atxt').innerHTML = `<span class="ok-ans">Bonne réponse : <span class="r"></span></span>`;
      div.querySelector('.r').textContent = a.correct;
    } else {
      div.querySelector('.rev-atxt').innerHTML = `<span class="err-ans">Ta réponse : <span class="s"></span></span> · <span class="ok-ans">Bonne : <span class="c"></span></span>${a.exp ? '<div class="rev-exp"><span class="exp-txt"></span></div>' : ''}`;
      div.querySelector('.s').textContent = a.sel;
      div.querySelector('.c').textContent = a.correct;
      if (a.exp) div.querySelector('.exp-txt').textContent = a.exp;
    }
    rl.appendChild(div);
  });

  sendResultEmail('Ziyad', ST.topic.name, score, ST.qs.length, ST.answers);
  if (score >= 7) confetti();
}

// ─── EmailJS ──────────────────────────────────────────────────
const EMAILJS_KEY      = 'CfrxX5NPbmE14wAmd';
const EMAILJS_PRIVATE_KEY = 'ehJuYOOg6elSKdIKyKKTz';
const EMAILJS_SERVICE  = 'service_NET_MAILS';
const EMAILJS_TEMPLATE = 'template_xfpfs3g';

function sendResultEmail(child, topic, score, total, answers) {
  const pct = score / total;
  const scoreColor = pct >= .8 ? '#10b981' : pct >= .6 ? '#06b6d4' : '#ef4444';
  const medal = pct >= .9 ? '🏆' : pct >= .7 ? '🌟' : pct >= .5 ? '👍' : '💪';
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const rows = answers.map((a, i) =>
    `<tr style="border-bottom:1px solid #e2e8f0;background:${a.ok?'#f0fdf4':'#fef2f2'}">
      <td style="padding:12px 14px;font-size:20px;vertical-align:top;width:36px">${a.ok?'✅':'❌'}</td>
      <td style="padding:12px 14px;font-family:sans-serif;vertical-align:top">
        <div style="font-weight:600;color:#1e293b;margin-bottom:4px">Q${i+1}. ${esc(a.q)}</div>
        <div style="font-size:13px;color:${a.ok?'#15803d':'#991b1b'}">Bonne réponse : <strong>${esc(a.correct)}</strong></div>
      </td>
    </tr>`
  ).join('');
  emailjs.init({ publicKey: EMAILJS_KEY, privateKey: EMAILJS_PRIVATE_KEY });
  emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
    child_name:  child,
    quiz_topic:  topic,
    score:       `${score} / ${total}`,
    score_color: scoreColor,
    medal:       medal,
    date:        new Date().toLocaleDateString('fr-FR', {weekday:'long',year:'numeric',month:'long',day:'numeric'}),
    rows:        rows
  })
  .then(() => console.log('EmailJS : envoi réussi'))
  .catch(e => console.warn('EmailJS : erreur', e));
}

function confetti() {
  const cols = ['#06b6d4','#0891b2','#10b981','#ef4444','#60a5fa','#f472b6','#22d3ee'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'conf';
      const size = 6 + Math.random() * 9;
      c.style.cssText = `left:${Math.random()*100}vw;top:-12px;width:${size}px;height:${size}px;background:${cols[~~(Math.random()*cols.length)]};animation-duration:${2+Math.random()*2}s;border-radius:${Math.random()>.5?'50%':'3px'}`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4500);
    }, i * 45);
  }
}

function goHome() { ST = {topic:null,qs:[],idx:0,answers:[],answered:false}; show('home-screen'); initHome(); }

initHome();
