<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrançaisBrevet — Français 3ème · Elyes</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root {
  --bg: #0d0d1f; --card: #161630; --text: #e2e8f0; --muted: #8892a4;
  --accent: #3b82f6; --success: #10b981; --error: #ef4444;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 20% 20%, rgba(59,130,246,.12) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(99,102,241,.08) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.screen { position: relative; z-index: 1; min-height: 100vh; display: none; }
.screen.active { display: block; }
.top-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: center; gap: 8px; padding: 10px 16px;
  background: rgba(13,13,31,.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(59,130,246,.12); flex-wrap: wrap;
}
.nav-tab { padding: 6px 16px; border-radius: 20px; font-size: .82rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all .2s; border: none; font-family: inherit; }
.nav-tab.home { background: rgba(255,255,255,.07); color: var(--muted); border: 1px solid rgba(255,255,255,.12); }
.nav-tab.home:hover { background: rgba(255,255,255,.13); color: var(--text); }
.nav-tab.mat  { background: rgba(249,115,22,.12); color: #fb923c; border: 1px solid rgba(249,115,22,.3); }
.nav-tab.mat:hover  { background: rgba(249,115,22,.25); }
.nav-tab.fra  { background: rgba(59,130,246,.2); color: #93c5fd; border: 1px solid rgba(59,130,246,.4); }
.nav-tab.sci  { background: rgba(16,185,129,.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,.3); }
.nav-tab.sci:hover { background: rgba(16,185,129,.28); }
.home-header { text-align: center; padding: 90px 20px 24px; }
.home-header h1 {
  font-size: clamp(2rem, 6vw, 3rem); font-weight: 900;
  background: linear-gradient(135deg, #60a5fa 0%, #818cf8 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px;
}
.home-header .sub { color: var(--muted); margin-top: 6px; font-size: 1rem; }
.week-badge { display: inline-block; margin-top: 14px; background: rgba(59,130,246,.15); border: 1px solid rgba(59,130,246,.35); border-radius: 20px; padding: 5px 18px; font-size: .8rem; color: #93c5fd; }
.topics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 16px; max-width: 960px; margin: 0 auto; padding: 16px 20px 60px; }
.topic-card { background: var(--card); border-radius: 18px; padding: 26px 24px; cursor: pointer; border: 1px solid rgba(255,255,255,.05); transition: transform .25s, box-shadow .25s; position: relative; overflow: hidden; }
.topic-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--tc, #3b82f6); }
.topic-card:hover { transform: translateY(-5px); box-shadow: 0 24px 48px rgba(0,0,0,.4); border-color: rgba(255,255,255,.12); }
.tc-icon { font-size: 2.4rem; margin-bottom: 12px; }
.tc-name { font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
.tc-desc { color: var(--muted); font-size: .83rem; line-height: 1.5; }
.tc-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; font-size: .78rem; color: var(--muted); }
.tc-score { background: rgba(59,130,246,.18); border-radius: 12px; padding: 2px 10px; color: #93c5fd; font-weight: 600; }
#quiz-screen { max-width: 720px; margin: 0 auto; padding: 80px 20px 60px; }
#results-screen { max-width: 620px; margin: 0 auto; padding: 20px 20px 60px; }
.back-btn { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09); color: var(--text); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: .9rem; margin-bottom: 18px; display: inline-flex; align-items: center; gap: 6px; transition: background .2s; }
.back-btn:hover { background: rgba(255,255,255,.1); }
.quiz-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
.prog-row { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
.prog-bar { flex: 1; height: 7px; background: rgba(255,255,255,.08); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #6366f1); border-radius: 4px; transition: width .45s ease; }
.prog-txt { font-size: .82rem; color: var(--muted); white-space: nowrap; }
.q-card { background: var(--card); border-radius: 20px; padding: 30px 28px; border: 1px solid rgba(255,255,255,.05); margin-top: 22px; animation: fadeUp .35s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.q-num { font-size: .75rem; color: #93c5fd; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
.q-text { font-size: 1.1rem; font-weight: 500; line-height: 1.65; margin-bottom: 24px; }
.opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
@media (max-width: 480px) { .opts-grid { grid-template-columns: 1fr; } }
.opt-btn { background: rgba(255,255,255,.04); border: 2px solid rgba(255,255,255,.07); border-radius: 12px; padding: 14px 18px; cursor: pointer; color: var(--text); font-size: .95rem; text-align: left; display: flex; align-items: center; gap: 12px; transition: background .18s, border-color .18s; font-family: inherit; }
.opt-btn:hover:not(:disabled) { background: rgba(59,130,246,.14); border-color: rgba(59,130,246,.45); }
.opt-btn.correct { background: rgba(16,185,129,.14); border-color: #10b981; }
.opt-btn.wrong   { background: rgba(239,68,68,.14); border-color: #ef4444; }
.opt-btn:disabled { cursor: default; }
.opt-letter { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; background: rgba(255,255,255,.08); display: flex; align-items: center; justify-content: center; font-size: .82rem; font-weight: 700; }
.opt-btn.correct .opt-letter { background: rgba(16,185,129,.3); }
.opt-btn.wrong   .opt-letter { background: rgba(239,68,68,.3); }
.feedback { margin-top: 16px; padding: 14px 18px; border-radius: 12px; font-size: .92rem; line-height: 1.55; animation: fadeUp .3s ease; }
.feedback.ok  { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); color: #6ee7b7; }
.feedback.err { background: rgba(239,68,68,.1);  border: 1px solid rgba(239,68,68,.3);  color: #fca5a5; }
.next-btn { width: 100%; margin-top: 16px; padding: 14px; background: linear-gradient(135deg, #3b82f6, #6366f1); border: none; border-radius: 13px; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .2s, transform .2s; }
.next-btn:hover { opacity: .9; transform: translateY(-1px); }
.score-wrap { position: relative; width: 150px; height: 150px; margin: 0 auto 22px; }
.score-svg { transform: rotate(-90deg); }
.score-bg  { fill: none; stroke: rgba(255,255,255,.06); stroke-width: 12; }
.score-arc { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
.score-inner { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-num { font-size: 2.8rem; font-weight: 900; line-height: 1; }
.score-den { font-size: .85rem; color: var(--muted); }
.res-top { text-align: center; padding: 36px 0 28px; }
.res-msg { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
.res-sub { color: var(--muted); margin-bottom: 30px; }
.review-list { display: flex; flex-direction: column; gap: 11px; margin-bottom: 24px; }
.rev-item { background: var(--card); border-radius: 13px; padding: 14px 16px; border: 1px solid rgba(255,255,255,.05); display: flex; gap: 12px; align-items: flex-start; }
.rev-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.rev-q { font-size: .88rem; margin-bottom: 4px; line-height: 1.4; }
.rev-a { font-size: .8rem; }
.ok-ans { color: #10b981; } .err-ans { color: #ef4444; }
.res-actions { display: flex; flex-direction: column; gap: 11px; }
.act-btn { padding: 14px; border-radius: 13px; font-size: 1rem; font-weight: 700; cursor: pointer; border: none; font-family: inherit; transition: opacity .2s, transform .2s; width: 100%; }
.act-btn:hover { opacity: .9; transform: translateY(-1px); }
.act-primary   { background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff; }
.act-secondary { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: var(--text); }
.conf { position: fixed; border-radius: 3px; animation: fall linear forwards; z-index: 9999; pointer-events: none; }
@keyframes fall { 0% { transform:translateY(-20px) rotate(0deg); opacity:1; } 100% { transform:translateY(105vh) rotate(720deg); opacity:0; } }
</style>
</head>

<div id="home-screen" class="screen active">
  <div class="home-header">
    <h1>📖 FrançaisBrevet</h1>
    <p class="sub">Français · 3ème · Brevet France</p>
    <div class="week-badge" id="week-badge"></div>
  </div>
  <div class="topics-grid" id="topics-grid"></div>
</div>

<div id="quiz-screen" class="screen">
  <div style="display:flex;gap:10px;margin-bottom:18px">
    <button class="back-btn" style="margin-bottom:0" onclick="goHome()">← Sujets</button>
    <a href="accueil.html" class="back-btn" style="text-decoration:none;margin-bottom:0">🏠 Accueil</a>
  </div>
  <div class="quiz-title" id="quiz-title"></div>

      <svg class="score-svg" width="150" height="150" viewBox="0 0 150 150">
        <circle class="score-bg" cx="75" cy="75" r="60"/>
        <circle class="score-arc" id="score-arc" cx="75" cy="75" r="60" stroke="#3b82f6" stroke-dasharray="377" stroke-dashoffset="377"/>
      </svg>
      <div class="score-inner"><div class="score-num" id="score-num">0</div><div class="score-den">sur 10</div></div>

    <button class="act-btn act-primary"   onclick="retryQuiz()">🔄 Recommencer ce quiz</button>
    <button class="act-btn act-secondary" onclick="goHome()">🏠 Choisir un autre thème</button>
  </div>
</div>

<script>
function SRNG(seed){let s=seed>>>0;this.next=()=>{s=Math.imul(1664525,s)+1013904223>>>0;return s/0x100000000;};this.int=n=>Math.floor(this.next()*n);this.shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=this.int(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;};this.pick=(a,n)=>this.shuffle(a).slice(0,n);}
function weekLabel(){const d=new Date(),jan=new Date(d.getFullYear(),0,1);return `Semaine ${Math.floor((d-jan)/86400000/7)+1} · ${d.getFullYear()}`;}

const TOPICS = [
  {
    id:'grammaire', name:'Grammaire — Classes de mots', icon:'🔤', color:'#3b82f6',
    desc:'Noms, verbes, adjectifs, adverbes, pronoms, déterminants, fonctions',
    qs:[
      {q:'Dans "Le chat noir dort", "noir" est…', o:['Un adverbe','Un adjectif qualificatif','Un nom','Un verbe'], a:'Un adjectif qualificatif', e:'"Noir" qualifie le nom "chat" → adjectif qualificatif épithète.'},
      {q:'"Parce que" est une conjonction de…', o:['Coordination','Subordination','Comparaison','Opposition'], a:'Subordination', e:'"Parce que" introduit une subordonnée de cause → conjonction de subordination.'},
      {q:'Dans "il court vite", "vite" est…', o:['Un adjectif','Un verbe','Un adverbe','Un nom'], a:'Un adverbe', e:'"Vite" modifie le verbe "court" → adverbe de manière.'},
      {q:'"Malgré" est…', o:['Une conjonction de coordination','Un adverbe','Une préposition','Un pronom'], a:'Une préposition', e:'"Malgré" est une préposition introduisant un groupe nominal.'},
      {q:'Dans "je le vois", "le" est un pronom…', o:['Sujet','COD','COI','Complément circonstanciel'], a:'COD', e:'"Le" représente quelqu\'un/quelque chose, complément d\'objet direct du verbe "vois".'},
      {q:'Pour former un adverbe à partir d\'un adjectif, on utilise…', o:['-ité','-ment','-eur','-isme'], a:'-ment', e:'On ajoute -ment à l\'adjectif au féminin : "lent" → "lente" → "lentement".'},
      {q:'Dans "qu\'il vienne", "vienne" est au…', o:['Indicatif présent','Conditionnel présent','Subjonctif présent','Impératif'], a:'Subjonctif présent', e:'Après "que" + valeur de souhait/doute → subjonctif présent.'},
      {q:'Le pronom "qui" dans "l\'homme qui parle" est…', o:['Interrogatif','Relatif','Personnel','Démonstratif'], a:'Relatif', e:'"Qui" reprend l\'antécédent "l\'homme" et introduit une relative → pronom relatif.'},
      {q:'Dans "Je mange du pain", "du" est…', o:['Un article défini','Un article partitif','Un possessif','Une préposition'], a:'Un article partitif', e:'"Du" = de + le (article partitif) exprimant une quantité indéfinie.'},
      {q:'La fonction du groupe en gras : "Il mange [rapidement]".', o:['Sujet','COD','Attribut du sujet','Complément circonstanciel de manière'], a:'Complément circonstanciel de manière', e:'"Rapidement" précise la manière dont il mange → CC de manière.'},
      {q:'Dans "Cette fleur est belle", "est" est…', o:['Un verbe d\'action','Un verbe d\'état','Un auxiliaire','Un participe'], a:'Un verbe d\'état', e:'"Être" ici relie le sujet "fleur" à l\'attribut "belle" → verbe d\'état.'},
      {q:'"Bien que" introduit une proposition subordonnée de…', o:['Cause','But','Concession','Condition'], a:'Concession', e:'"Bien que" exprime une opposition, une concession : "Bien qu\'il pleuve, il sort."'},
      {q:'Le COI répond à la question…', o:['Qui? Quoi?','À qui? À quoi? De qui? De quoi?','Comment?','Pourquoi?'], a:'À qui? À quoi? De qui? De quoi?', e:'Le COI est introduit par une préposition (à, de) → à qui/à quoi/de qui/de quoi?'},
      {q:'Dans "Les enfants jouent", la fonction de "Les enfants" est…', o:['COD','Sujet','Attribut','Complément de nom'], a:'Sujet', e:'"Les enfants" fait l\'action de jouer → sujet du verbe "jouent".'},
      {q:'"Très" est…', o:['Un adjectif','Un verbe','Un adverbe d\'intensité','Une préposition'], a:'Un adverbe d\'intensité', e:'"Très" modifie un adjectif ou un adverbe → adverbe d\'intensité.'}
    ]
  },
  {
    id:'conjugaison', name:'Conjugaison', icon:'⏱️', color:'#6366f1',
    desc:'Passé simple, subjonctif, conditionnel, modes et temps',
    qs:[
      {q:'"Ils allèrent" est conjugué au…', o:['Imparfait','Passé composé','Passé simple','Plus-que-parfait'], a:'Passé simple', e:'"Allèrent" = passé simple de "aller" (ils allèrent).'},
      {q:'Au passé simple, "chanter" à la 3ème personne du pluriel donne…', o:['Ils chantaient','Ils chanteront','Ils chantèrent','Ils chantèreaux'], a:'Ils chantèrent', e:'Verbes du 1er groupe au passé simple : -ai, -as, -a, -âmes, -âtes, -èrent.'},
      {q:'Le conditionnel présent de "pouvoir" à la 1ère personne du singulier est…', o:['Je pouvais','Je pourrais','Je pourrai','Je peux'], a:'Je pourrais', e:'Conditionnel présent = radical du futur + terminaisons de l\'imparfait : je pourrais.'},
      {q:'Au subjonctif présent, "être" donne à la 1ère personne du singulier…', o:['J\'avais','J\'ai','Que je sois','Que j\'aie'], a:'Que je sois', e:'Subjonctif présent d\'être : que je sois, que tu sois, qu\'il soit…'},
      {q:'Le plus-que-parfait est formé de…', o:['L\'imparfait de l\'auxiliaire + participe passé','Le passé simple + participe passé','Le futur + participe passé','L\'infinitif + participe passé'], a:'L\'imparfait de l\'auxiliaire + participe passé', e:'Ex: j\'avais mangé, tu étais parti → imparfait de avoir/être + participe passé.'},
      {q:'Au passé simple, "finir" à la 3ème personne du singulier donne…', o:['Il finissait','Il finit','Il finira','Il finissait'], a:'Il finit', e:'Verbes du 2ème groupe au passé simple : il finit, nous finîmes, ils finirent.'},
      {q:'"Si j\'avais de l\'argent, j\'achèterais une voiture." "Achèterais" est au…', o:['Subjonctif','Conditionnel présent','Futur simple','Imparfait'], a:'Conditionnel présent', e:'Système hypothétique : si + imparfait → conditionnel présent dans la principale.'},
      {q:'"Viens me voir!" est à quel mode?', o:['Indicatif','Subjonctif','Conditionnel','Impératif'], a:'Impératif', e:'L\'impératif exprime un ordre ou une invitation. Pas de pronom sujet.'},
      {q:'Au participe passé, "venir" donne…', o:['Vendu','Venu','Venant','Venir'], a:'Venu', e:'Venir → venu (comme tenir → tenu, tenir → parti).'},
      {q:'"Bien qu\'il soit malade" → "soit" est au…', o:['Indicatif présent','Subjonctif présent','Conditionnel','Imparfait'], a:'Subjonctif présent', e:'"Bien que" impose le subjonctif dans la subordonnée.'},
      {q:'Au futur simple, "être" à la 3ème personne du pluriel donne…', o:['Ils étaient','Ils ont été','Ils seront','Ils seraient'], a:'Ils seront', e:'Futur de être : je serai, tu seras, il sera, nous serons, vous serez, ils seront.'},
      {q:'La voix passive de "Le chat mange la souris" est…', o:['La souris est mangée par le chat','La souris mange le chat','Le chat est mangé par la souris','La souris a été mangée'], a:'La souris est mangée par le chat', e:'Voix passive : sujet ← COD, "par" + ancien sujet. Le temps reste le présent.'},
      {q:'Au passé simple, "prendre" à la 3ème personne du pluriel donne…', o:['Ils prenaient','Ils prirent','Ils prendront','Ils pris'], a:'Ils prirent', e:'Prendre : je pris, tu pris, il prit, nous prîmes, vous prîtes, ils prirent.'},
      {q:'L\'imparfait exprime…', o:['Une action soudaine et terminée','Une action habituelle ou en cours dans le passé','Une action future','Une action terminée avant une autre'], a:'Une action habituelle ou en cours dans le passé', e:'L\'imparfait décrit une durée, une habitude ou une action en cours dans le passé.'},
      {q:'Au subjonctif présent, "avoir" donne à la 3ème personne du singulier…', o:['Il a','Qu\'il ait','Il avait','Qu\'il aie'], a:'Qu\'il ait', e:'Avoir au subjonctif : que j\'aie, que tu aies, qu\'il ait, que nous ayons…'}
    ]
  },
  {
    id:'figures', name:'Figures de style', icon:'✍️', color:'#a855f7',
    desc:'Comparaison, métaphore, hyperbole, anaphore, etc.',
    qs:[
      {q:'"Sa voix est douce comme du miel" est une…', o:['Métaphore','Comparaison','Hyperbole','Personnification'], a:'Comparaison', e:'Une comparaison comporte un outil comparatif (comme, tel que…) + comparé + comparant.'},
      {q:'"Je meurs de faim" est une…', o:['Métaphore','Comparaison','Hyperbole','Litote'], a:'Hyperbole', e:'L\'hyperbole exagère une réalité pour l\'accentuer. On ne meurt pas vraiment de faim.'},
      {q:'"Les feuilles dansaient au vent" est une…', o:['Comparaison','Métaphore','Personnification','Allégorie'], a:'Personnification', e:'La personnification donne des attributs humains à un objet ou à la nature.'},
      {q:'"Sa voix est du velours" (sans outil comparatif) est une…', o:['Comparaison','Métaphore','Hyperbole','Antithèse'], a:'Métaphore', e:'La métaphore fait une assimilation directe sans outil comparatif.'},
      {q:'Répéter un mot ou groupe en début de plusieurs phrases s\'appelle…', o:['Anaphore','Épiphore','Allitération','Assonance'], a:'Anaphore', e:'L\'anaphore répète un terme en tête de vers ou de phrase pour un effet d\'insistance.'},
      {q:'"Ce n\'est pas sans difficulté" (pour dire "c\'est difficile") est une…', o:['Hyperbole','Litote','Euphémisme','Antiphrase'], a:'Litote', e:'La litote dit moins pour suggérer plus. "Ce n\'est pas sans difficulté" = "c\'est très difficile".'},
      {q:'Dire le contraire de ce que l\'on pense avec ironie s\'appelle…', o:['Hyperbole','Litote','Antiphrase','Euphémisme'], a:'Antiphrase', e:'L\'antiphrase (ironie) consiste à dire le contraire de ce qu\'on pense : "Quelle belle journée!" par temps de pluie.'},
      {q:'La répétition du son [s] dans "six sages serpents" est une…', o:['Assonance','Allitération','Anaphore','Paronomase'], a:'Allitération', e:'L\'allitération est la répétition d\'un son consonantique. L\'assonance porte sur les voyelles.'},
      {q:'"Lumière noire" est un…', o:['Paradoxe','Oxymore','Antithèse','Chiasme'], a:'Oxymore', e:'L\'oxymore réunit deux termes contradictoires dans le même groupe nominal.'},
      {q:'"Il est parti pour un grand voyage" (= il est mort) est un…', o:['Hyperbole','Métaphore','Euphémisme','Oxymore'], a:'Euphémisme', e:'L\'euphémisme atténue une réalité douloureuse ou choquante par une expression plus douce.'},

let ST={screen:'home',topic:null,qs:[],idx:0,answers:[],answered:false};
const getScores=()=>{try{return JSON.parse(localStorage.getItem('elyesFra')||'{}');}catch{return{};}};
const saveScore=(id,s)=>{const sc=getScores();if(sc[id]===undefined||s>sc[id]){sc[id]=s;localStorage.setItem('elyesFra',JSON.stringify(sc));}};
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function initHome(){
  document.getElementById('week-badge').textContent=weekLabel();
  const sc=getScores(),grid=document.getElementById('topics-grid');grid.innerHTML='';
  TOPICS.forEach(t=>{
    const el=document.createElement('div');el.className='topic-card';el.style.setProperty('--tc',t.color);
    const best=sc[t.id];
    el.innerHTML=`<div class="tc-icon">${t.icon}</div><div class="tc-name">${t.name}</div><div class="tc-desc">${t.desc}</div><div class="tc-meta"><span>10 questions · brevet</span>${best!==undefined?`<span class="tc-score">Meilleur : ${best}/10</span>`:'<span>Pas encore fait</span>'}</div>`;
    el.onclick=()=>startQuiz(t.id);grid.appendChild(el);
  });
}
function SRNG(seed){let s=seed>>>0;this.next=()=>{s=Math.imul(1664525,s)+1013904223>>>0;return s/0x100000000;};this.int=n=>Math.floor(this.next()*n);this.shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=this.int(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;};this.pick=(a,n)=>this.shuffle(a).slice(0,n);}
function startQuiz(id){const topic=TOPICS.find(t=>t.id===id);if(!topic)return;const rng=new SRNG(Date.now()^(Math.random()*0x100000000));const qs=rng.pick(topic.qs,10).map(q=>({...q,o:rng.shuffle(q.o)}));ST={screen:'quiz',topic,qs,idx:0,answers:[],answered:false};show('quiz-screen');document.getElementById('quiz-title').textContent=`${topic.icon} ${topic.name}`;renderQ();}
function retryQuiz(){startQuiz(ST.topic.id);}
function goHome(){show('home-screen');}
function renderQ(){const{qs,idx}=ST,q=qs[idx];document.getElementById('prog-fill').style.width=(idx/qs.length*100)+'%';document.getElementById('prog-txt').textContent=`${idx+1} / ${qs.length}`;const container=document.getElementById('q-container');container.innerHTML=`<div class="q-card"><div class="q-num">Question ${idx+1} sur ${qs.length}</div><div class="q-text" id="qtxt"></div><div class="opts-grid" id="opts"></div><div id="fb"></div></div><div id="nxt"></div>`;document.getElementById('qtxt').textContent=q.q;const LETTERS=['A','B','C','D'];q.o.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.innerHTML=`<span class="opt-letter">${LETTERS[i]}</span><span class="opt-text"></span>`;btn.querySelector('.opt-text').textContent=opt;btn.onclick=()=>pick(btn,opt);document.getElementById('opts').appendChild(btn);});ST.answered=false;}
function pick(btn,val){if(ST.answered)return;ST.answered=true;const q=ST.qs[ST.idx],correct=val===q.a;ST.answers.push({q:q.q,given:val,correct:q.a,ok:correct,e:q.e});document.querySelectorAll('.opt-btn').forEach(b=>{b.disabled=true;if(b.querySelector('.opt-text').textContent===q.a)b.classList.add('correct');else if(b===btn&&!correct)b.classList.add('wrong');});const fb=document.getElementById('fb');fb.className='feedback '+(correct?'ok':'err');fb.textContent=(correct?'✅ Correct ! ':'❌ Non. ')+q.e;const nb=document.createElement('button');nb.className='next-btn';nb.textContent=ST.idx<ST.qs.length-1?'Question suivante →':'Voir mes résultats 🏁';nb.onclick=nextQ;document.getElementById('nxt').appendChild(nb);}
function nextQ(){ST.idx++;if(ST.idx<ST.qs.length){renderQ();return;}const score=ST.answers.filter(a=>a.ok).length;saveScore(ST.topic.id,score);showResults(score);}
function showResults(score){show('results-screen');const total=ST.qs.length,pct=score/total;document.getElementById('score-num').textContent=score;const arc=document.getElementById('score-arc');setTimeout(()=>{arc.style.strokeDashoffset=377*(1-pct);},100);arc.style.stroke=pct>=0.8?'#10b981':pct>=0.5?'#f59e0b':'#ef4444';const msgs=[['😓','Encore un effort…','Révise les notions et recommence !'],['🙂','Pas mal !','Continue à t\'entraîner pour le brevet.'],['😊','Bien joué !','Tu maîtrises bien ce thème.'],['🌟','Excellent !','Tu es prêt(e) pour le brevet de français !']];const m=msgs[pct>=0.9?3:pct>=0.7?2:pct>=0.5?1:0];document.getElementById('res-msg').textContent=m[0]+' '+m[1];document.getElementById('res-sub').textContent=m[2];const rev=document.getElementById('review-list');rev.innerHTML='';ST.answers.forEach(a=>{const d=document.createElement('div');d.className='rev-item';d.innerHTML=`<span class="rev-icon">${a.ok?'✅':'❌'}</span><div><div class="rev-q">${a.q}</div><div class="rev-a ${a.ok?'ok-ans':'err-ans'}">${a.ok?'Bonne réponse : '+a.correct:'Ta réponse : '+a.given+' · Réponse : '+a.correct}</div></div>`;rev.appendChild(d);});sendResultEmail('Elyes',ST.topic.name,score,total,ST.answers);if(pct===1)confetti();}
// ─── EmailJS ──────────────────────────────────────────────────
const EMAILJS_KEY      = 'CfrxX5NPbmE14wAmd';
const EMAILJS_SERVICE  = 'service_NET_MAILS';
const EMAILJS_TEMPLATE = 'template_xfpfs3g';
function sendResultEmail(child,topic,score,total,answers){
  const pct=score/total;
  const scoreColor=pct>=.8?'#10b981':pct>=.6?'#f59e0b':'#ef4444';
  const medal=pct>=.9?'🏆':pct>=.7?'🌟':pct>=.5?'👍':'💪';
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const rows=answers.map((a,i)=>
    `<tr style="border-bottom:1px solid #e2e8f0;background:${a.ok?'#f0fdf4':'#fef2f2'}">
      <td style="padding:12px 14px;font-size:20px;vertical-align:top;width:36px">${a.ok?'✅':'❌'}</td>
      <td style="padding:12px 14px;font-family:sans-serif;vertical-align:top">
        <div style="font-weight:600;color:#1e293b;margin-bottom:4px">Q${i+1}. ${esc(a.q)}</div>
        <div style="font-size:13px;color:${a.ok?'#15803d':'#991b1b'}">Bonne réponse : <strong>${esc(a.correct)}</strong></div>
      </td>
    </tr>`
  ).join('');
  emailjs.init({publicKey:EMAILJS_KEY});
  emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{
    child_name:child,quiz_topic:topic,
    score:`${score} / ${total}`,
    score_color:scoreColor,medal:medal,
    date:new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
    rows:rows
  }).catch(e=>console.warn('EmailJS:',e));
}
function confetti(){const colors=['#3b82f6','#6366f1','#a855f7','#ec4899','#14b8a6','#f59e0b'];for(let i=0;i<60;i++){const el=document.createElement('div');el.className='conf';Object.assign(el.style,{left:Math.random()*100+'vw',width:Math.random()*8+4+'px',height:Math.random()*8+4+'px',background:colors[Math.floor(Math.random()*colors.length)],animationDuration:Math.random()*2+1.5+'s',animationDelay:Math.random()*0.8+'s'});document.body.appendChild(el);setTimeout(()=>el.remove(),4000);}}
initHome();
</script>
