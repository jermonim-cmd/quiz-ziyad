:root {
  --bg: #060f0b;
  --card: #0d1f17;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);

  overflow-x: hidden;

body::before {

  cursor: pointer; text-decoration: none; transition: all .2s; border: none; font-family: inherit;
  white-space: nowrap;
}
.nav-tab.geo  { background: rgba(124,58,237,.15); color: #a78bfa; border: 1px solid rgba(124,58,237,.3); }
.nav-tab.dec  { background: rgba(245,158,11,.12); color: #fcd34d; border: 1px solid rgba(245,158,11,.3); }

.nav-tab.dec:hover  { background: rgba(245,158,11,.25); }

}
.topic-card::before {

  background: var(--tc, #059669);
}

  transform: translateY(-5px); border-color: rgba(255,255,255,.12);

.act-secondary { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: var(--text); }

<script>
// ─── RNG ─────────────────────────────────────────────────────
function SRNG(seed) {
  let s = seed >>> 0;
  this.next = () => { s = Math.imul(1664525, s) + 1013904223 >>> 0; return s / 0x100000000; };
  this.int  = n => Math.floor(this.next() * n);
  this.shuffle = a => {
    const r = [...a];
    for (let i = r.length - 1; i > 0; i--) { const j = this.int(i+1); [r[i],r[j]]=[r[j],r[i]]; }
    return r;
  };
  this.pick = (a, n) => this.shuffle(a).slice(0, n);
}
function weekLabel() {
  const d = new Date(), jan = new Date(d.getFullYear(), 0, 1);
  return `Semaine ${Math.floor((d - jan) / 86400000 / 7) + 1} · ${d.getFullYear()}`;
}

      { q:'À quelle température l\'eau bout-elle à pression normale?',

// ─── State ────────────────────────────────────────────────────
let ST = { topic:null, qs:[], idx:0, answers:[], answered:false };
const getScores = () => { try { return JSON.parse(localStorage.getItem('sciQ') || '{}'); } catch { return {}; } };
const saveScore  = (id, s) => { const sc = getScores(); if (sc[id]===undefined || s>sc[id]) { sc[id]=s; localStorage.setItem('sciQ', JSON.stringify(sc)); } };

function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

// ─── Home ─────────────────────────────────────────────────────
function initHome() {
  document.getElementById('week-badge').textContent = weekLabel();
  const sc = getScores();
  const grid = document.getElementById('topics-grid');
  grid.innerHTML = '';
  TOPICS.forEach(t => {
    const el = document.createElement('div');
    el.className = 'topic-card';
    el.style.setProperty('--tc', t.color);
    const best = sc[t.id];
    el.innerHTML = `
      <div class="tc-icon">${t.icon}</div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-desc">${t.desc}</div>
      <div class="tc-meta">
        <span>10 questions · aléatoires</span>
        ${best!==undefined ? `<span class="tc-score">Meilleur : ${best}/10</span>` : '<span>Pas encore fait</span>'}
      </div>`;
    el.onclick = () => startQuiz(t.id);
    grid.appendChild(el);
  });
}

// ─── Quiz ─────────────────────────────────────────────────────
function startQuiz(id) {
  const topic = TOPICS.find(t=>t.id===id);
  if (!topic) return;
  const rng = new SRNG(Date.now() ^ (Math.random() * 0x100000000));
  const qs  = rng.pick(topic.qs, 10).map(q => ({ ...q, o: rng.shuffle(q.o) }));
  ST = { topic, qs, idx:0, answers:[], answered:false };
  show('quiz-screen');
  document.getElementById('quiz-title').textContent = `${topic.icon} ${topic.name}`;
  renderQ();
}
function retryQuiz() { startQuiz(ST.topic.id); }

function renderQ() {
  const { qs, idx } = ST;
  const q = qs[idx];
  document.getElementById('prog-fill').style.width = (idx / qs.length * 100) + '%';
  document.getElementById('prog-txt').textContent = `${idx+1} / ${qs.length}`;

  const c = document.getElementById('q-container');
  c.innerHTML = `
    <div class="q-card">
      <div class="q-num">Question ${idx+1} sur ${qs.length}</div>
      <div class="q-text" id="qtxt"></div>
      <div class="opts-grid" id="opts"></div>
      <div id="fb"></div>
    </div>
    <div id="nxt"></div>`;
  document.getElementById('qtxt').textContent = q.q;

  const LETTERS = ['A','B','C','D'];
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span class="opt-text"></span>`;
    btn.querySelector('.opt-text').textContent = opt;
    btn.onclick = () => pick(btn, opt);
    document.getElementById('opts').appendChild(btn);
  });
  ST.answered = false;
}

function pick(btn, val) {
  if (ST.answered) return;
  ST.answered = true;
  const q = ST.qs[ST.idx];
  const ok = val === q.a;
  ST.answers.push({ q:q.q, sel:val, ok, correct:q.a, exp:q.e });

  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    if (b.querySelector('.opt-text').textContent === q.a) b.classList.add('correct');
    else if (b === btn && !ok) b.classList.add('wrong');
  });

  const fb = document.getElementById('fb');
  fb.className = `feedback ${ok ? 'ok' : 'err'}`;
  fb.innerHTML = `<strong></strong><br><small></small>`;
  fb.querySelector('strong').textContent = ok ? '✅ Bravo !' : `❌ Pas tout à fait — la bonne réponse est : ${q.a}`;
  fb.querySelector('small').textContent = q.e;

  const isLast = ST.idx === ST.qs.length - 1;
  const nb = document.createElement('button');
  nb.className = 'next-btn';
  nb.textContent = isLast ? '🏁 Voir les résultats' : 'Question suivante →';
  nb.onclick = isLast ? showResults : () => { ST.idx++; renderQ(); };
  document.getElementById('nxt').appendChild(nb);
}

function showResults() {
  const score = ST.answers.filter(a=>a.ok).length;
  saveScore(ST.topic.id, score);
  show('results-screen');

  const circ = 2 * Math.PI * 60;
  const pct  = score / ST.qs.length;
  const col  = pct >= .8 ? '#10b981' : pct >= .6 ? '#f59e0b' : '#ef4444';
  const arc  = document.getElementById('score-arc');
  arc.setAttribute('stroke', col);
  arc.setAttribute('stroke-dasharray', circ);
  arc.setAttribute('stroke-dashoffset', circ);
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-num').style.color = col;
  setTimeout(() => {
    arc.style.transition = 'stroke-dashoffset 1s ease';
    arc.setAttribute('stroke-dashoffset', circ * (1 - pct));
  }, 50);

  const msgs = [[9,'🌟 Excellent!','Tu maîtrises ces notions de sciences!'],[7,'🎉 Très bien!','Continue, tu es sur la bonne voie!'],[5,'💪 Pas mal!','Relis tes notes et réessaie!'],[0,'📚 Continue!','N\'abandonne pas — chaque erreur est un apprentissage!']];
  const [,m,s] = msgs.find(([min]) => score >= min);
  document.getElementById('res-msg').textContent = m;
  document.getElementById('res-sub').textContent = s;

  const rl = document.getElementById('review-list');
  rl.innerHTML = '';
  ST.answers.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'rev-item';
    div.innerHTML = `
      <div class="rev-icon">${a.ok ? '✅' : '❌'}</div>
      <div>
        <div class="rev-q"><strong>Q${i+1}.</strong> <span class="qt"></span></div>
        <div class="rev-a at"></div>
      </div>`;
    div.querySelector('.qt').textContent = a.q;
    if (a.ok) {
      div.querySelector('.at').innerHTML = `<span class="ok-ans">Bonne réponse : <span class="r"></span></span>`;
      div.querySelector('.r').textContent = a.correct;
    } else {
      div.querySelector('.at').innerHTML = `<span class="err-ans">Ta réponse : <span class="s"></span></span> · <span class="ok-ans">Bonne : <span class="c"></span></span>${a.exp ? '<div class="rev-exp"><span class="exp-txt"></span></div>' : ''}`;
      div.querySelector('.s').textContent = a.sel;
      div.querySelector('.c').textContent = a.correct;
      if (a.exp) div.querySelector('.exp-txt').textContent = a.exp;
    }
    rl.appendChild(div);
  });

  sendResultEmail('Ziyad', ST.topic.name, score, ST.qs.length, ST.answers);
  if (score >= 7) confetti();
}

// ─── EmailJS ──────────────────────────────────────────────────
const EMAILJS_KEY      = 'CfrxX5NPbmE14wAmd';
const EMAILJS_SERVICE  = 'service_NET_MAILS';
const EMAILJS_TEMPLATE = 'template_xfpfs3g';

function sendResultEmail(child, topic, score, total, answers) {
  const pct = score / total;
  const scoreColor = pct >= .8 ? '#10b981' : pct >= .6 ? '#f59e0b' : '#ef4444';
  const medal = pct >= .9 ? '🏆' : pct >= .7 ? '🌟' : pct >= .5 ? '👍' : '💪';
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const rows = answers.map((a, i) =>
    `<tr style="border-bottom:1px solid #e2e8f0;background:${a.ok?'#f0fdf4':'#fef2f2'}">
      <td style="padding:12px 14px;font-size:20px;vertical-align:top;width:36px">${a.ok?'✅':'❌'}</td>
      <td style="padding:12px 14px;font-family:sans-serif;vertical-align:top">
        <div style="font-weight:600;color:#1e293b;margin-bottom:4px">Q${i+1}. ${esc(a.q)}</div>
        <div style="font-size:13px;color:${a.ok?'#15803d':'#991b1b'}">Bonne réponse : <strong>${esc(a.correct)}</strong></div>
      </td>
    </tr>`
  ).join('');
  emailjs.init({ publicKey: EMAILJS_KEY });
  emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
    child_name:  child,
    quiz_topic:  topic,
    score:       `${score} / ${total}`,
    score_color: scoreColor,
    medal:       medal,
    date:        new Date().toLocaleDateString('fr-FR', {weekday:'long',year:'numeric',month:'long',day:'numeric'}),
    rows:        rows
  }).catch(e => console.warn('EmailJS:', e));
}

function confetti() {
  const cols = ['#059669','#34d399','#10b981','#f59e0b','#ef4444','#60a5fa','#a78bfa'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'conf';
      const sz = 6 + Math.random() * 9;
      c.style.cssText = `left:${Math.random()*100}vw;top:-12px;width:${sz}px;height:${sz}px;background:${cols[~~(Math.random()*cols.length)]};animation-duration:${2+Math.random()*2}s;border-radius:${Math.random()>.5?'50%':'3px'}`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4500);
    }, i * 45);
  }
}

function goHome() { ST = {topic:null,qs:[],idx:0,answers:[],answered:false}; show('home-screen'); initHome(); }

initHome();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
